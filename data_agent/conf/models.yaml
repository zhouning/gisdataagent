# GIS Data Agent — Model Configuration (v20.0)
#
# Declarative LLM provider configuration. Models defined here are loaded
# into ModelRegistry at startup, complementing the built-in defaults.
#
# To add a new model: uncomment and fill in the relevant section below.
# The model_gateway.py will merge YAML models with hardcoded defaults.

models:
  gemini-2.0-flash:
    backend: google_genai
    tier: fast
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    context_tokens: 1048576
    capabilities: [text, code, vision]
    tasks: [routing, exploration, visualization]
    description: "Gemini 2.0 Flash — fast routing and lightweight tasks"

  gemini-2.5-flash:
    backend: google_genai
    tier: standard
    cost_per_1k_input: 0.15
    cost_per_1k_output: 0.6
    context_tokens: 1048576
    capabilities: [text, code, vision, reasoning]
    tasks: [processing, analysis, governance, qc]
    description: "Gemini 2.5 Flash — balanced speed and quality"

  gemini-2.5-pro:
    backend: google_genai
    tier: premium
    cost_per_1k_input: 1.25
    cost_per_1k_output: 10.0
    context_tokens: 1048576
    capabilities: [text, code, vision, reasoning, complex_analysis]
    tasks: [reporting, complex_analysis, causal]
    description: "Gemini 2.5 Pro — highest quality for complex tasks"

  # --- Gemma 4 via Gemini API (v23.0) ---
  gemma-4-31b-it:
    backend: google_genai
    tier: standard
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    context_tokens: 256000
    capabilities: [text, code, reasoning, tool_calling]
    tasks: [processing, analysis, governance, qc]
    description: "Gemma 4 31B IT — open model via Gemini API, tool calling supported"

