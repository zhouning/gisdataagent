    \ a)第一层为补充耕地类型代码，包括项目类和非项目类。项目类中，“Z”表示土地整治类，“G”表示高标准农田建设类，“J”表示城乡建设用地增减挂钩类，“Q”表示其他类。非项目类用“F”表示；\
    \ b)第二层为县级行政区划代码，参考 GB/T 2260 中规定的 6 位数字代码进行编码； c)第三层为验收年度，指补充耕地的验收年度； d)第四层为补充耕地顺序号，采用\
    \ 4 位数字码，码值：0001～9999；e) 第五层为图斑顺序号，采用 6 位数字码，码值：000001～999999。编号为15位，由补充耕地类型、县级行政区划代码、验收年度、补充耕地顺序码组成。\n\
    注2：指挂钩到补充耕地项目或批次补充耕地的指标数量。 \n注3：见注1。\n注4：挂钩补充耕地落实到具体图斑（即填写了挂钩图斑编号）时必填。指挂钩到补充耕地储备图斑的指标数量。"
