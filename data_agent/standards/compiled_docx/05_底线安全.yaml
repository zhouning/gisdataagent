  - '注1:行政区名称即指标库账户名称，采用中华人民共和国行政分区，行政区代码即指标库账户代采用GB/T 2260《中华人民共和国行政区划代码》中规定的数字代码6位数，下同。

    注2:指标报备入库上限指年度内新方式入库补充耕地指标的报备入库上限。部级账户不设指标报备入库上限;省级账户的指标报备入库上限由部级平台统一设定并通过服务接口方式交互至省级平台，省级账户的指标报备入库上限是指该省(区、市)各县级账户年度内按照新方式入库的补充耕地指标累计规模上限(含上年度没有使用的新方式入库补充耕地指标结转规模);市、县级账户的指标报备入库上限由省级平台统一设定，市级账户的指标报备入库上限是指该市(州)各县级账户年度内按照新方式入库的补充耕地指标累计规模上限(含上年度没有使用的新方式入库补充耕地指标结转规模)。

    注3:指标年度是指设置新方式入库补充耕地指标规模上限的年份，由部级平台通过接口方式交互至省级平台。

    注4:各级账户原补充耕地指标储备库中的数量指标和水田规模(含负值)，由部级平台通过接口方式结转至省级平台的相应账户。

    注5:指各县(市、区)按照新方式入库的补充耕地指标数展。同一行政区内每年度按照新方式储备的补充耕地指标总量，不得超出该行政区本年度的指标报备入库上限。省、市级账户不储备新入库的补充耕地指标。

    注6:承诺数量指标和水田指标是指原采取承诺方式落实占补平衡的建设项目，承诺应归还的数量、水田指标规模。

    注7：记录数据在交换前实际更新生效时间。

    注8：记录数据交换时间。

    注9:指标规模统计单位为公顷。'
