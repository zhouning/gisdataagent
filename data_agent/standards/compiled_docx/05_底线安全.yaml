  notes:
  - "注1：按照每个要素的标识码应具有唯一代码的基本要求，依据GB/T 7027规定的信息分类原则和方法， 要素标识码采用三层18位层次码结构，由县级行政区划代码、要素层代码、要素标识码顺序号构成。\n\
    注2：永久基本农田图斑编号由“县级行政区划代码（6位）+乡级行政区划代码（3位）+村级行政区划代码（3位）+ 永久基本农田图斑（6位数字顺序码）”组成，以村为单位，按从上到下，从左到右的顺序编号，下同。\
    \ \n注3：来源于国土调查数据库中地类图斑编号。图斑以村级调查区为单位统一顺序编号。变更图斑号在本村级调查区最大图斑号后续编。 \n注4：地类编码和名称按《第三次全国国土调查技术规程》附录A\
    \ 第三次全国国土调查工作分类执行,填写最末级分类。\n注5：权属单位代码和坐落单位代码到村级，权属单位代码和坐落单位代码为村级行政区代码+“0000000”。\
    \ \n注6：坐落单位代码指该地类图斑实际坐落单位的代码。 \n注7：“永久基本农田图斑面积”指用经过核定的永久基本农田图斑多边形边界内部所有地类的面积（如永久基本农田图斑含岛、孔，则扣除岛、孔的面积）。\
    \ \n注8：扣除地类面积=永久基本农田图斑面积*扣除地类系数。 \n注9：“永久基本农田面积”（即“永久基本农田图斑地类面积”或“永久基本农田图斑净面积”）=永久基本农田图斑面积-扣除地类面积。\
    \ \n注10：当图斑为坡地耕地时，耕地类型填写“PD”；图斑为梯田耕地时，耕地类型填写“TT”。 \n注11：根据GB/T 28407开展耕地分等调查评价，填写耕地利用等别。\
    \ \n注12：按照GB T 33469，填写质量等级。 \n注13：耕地资源质量分类结果用12位代码来表达，具体参考《第三次全国国土调查县级耕地资源质量分类数据库标准(试行)》。\
    \ \n注14：图斑是飞入地填写“1”，不是飞入地填写“0”。当该地类图斑为飞入地时, 实际坐落单位的代码与权属单位代码不同。 \n注15：数据生产的年份。\n\
    注16：每个涉及保护责任的“组”填写一条记录。如果村级以下没有组的划分，此字段可以不填，后面相关组的保护信息填写责任农户保护信息。 \n注17：如果填写了图斑对应的保护责任的“组”名称，则需要填写“组”责任人。\
    \ \n注18：用于存储外挂的影像数据文件的路径。如保护责任落实到组，则上传到组的责任书，如保护责任落实到具体农户， 上传与农户签订的责任书影像。"
