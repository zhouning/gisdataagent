    dtype: Char
    length: '4'
    decimal: ''
    domain: ''
    constraint: ''
    note: ''
  notes:
  - '注1:读取坐标文件中填写的土地用途值。字段代码按照《国土空间调查、规划、用途管制用地用海分类指南》执行。其他表的同类字段遵循同样规则。

    注2：指设施农业项目名称。按照经营者与农村集体经济组织签订用地协议中的项目名称填写（扩建项目名称为原项目名称后标注改扩建）

    注3：指设施农业项目所在地。登录后系统将自动获取项目所在省份、市（地、州）、县（市、区、旗）名称，手动填写具体乡（镇、街道）和村名称。

    注4：按照设施农业生产类型划分，包括作物种植（分粮食、蔬菜及其他）、畜禽养殖（分猪、鸡、牛、羊及其他）、水产养殖等情形。

    注5：生产期限开始时间和生产期限结束时间：指农村集体经济组织与经营者约定的设施农业用地使用起止时间。

    注6：指设施农业项目使用土地总面积，相应上传用地拐点坐标。其中，粮食、香蕉、茶园等农业规模化生产，仅指看护房、农资农机具存放场所等为生产服务以及与生产直接关联的设施用地总面积。单位为公顷，保留小数点后4位；坐标系采用2000国家大地坐标系（下同）。

    注7：指设施农业项目使用农用地面积，地类依据最新的年度土地变更调查结果认定（下同）。单位为公顷，保留小数点后4位。

    注8.使用耕地面积：指设施农业项目使用耕地面积。单位为公顷，保留小数点后4位。

    注9：破坏耕地耕作层面积：指设施农业项目使用耕地中涉及破坏耕地耕作层面积。单位为公顷，保留小数点后4位。

    注10：指设施农业项目使用永久基本农田面积，相应上传地块拐点坐标。单位为公顷，保留小数点后4位。

    注11：指设施农业项目使用永久基本农田中破坏耕地耕作层、按要求补划的永久基本农田面积，相应上传地块拐点坐标。单位为公顷，保留小数点后4位。

    注12：指设施农业项目使用永久基本农田中破坏耕地耕作层面积，相应上传地块拐点坐标。单位为公顷，保留小数点后4位。'
