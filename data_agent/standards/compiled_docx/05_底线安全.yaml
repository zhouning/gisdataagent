  notes:
  - '注1：指设施农业项目名称。按照经营者与农村集体经济组织签订用地协议中的项目名称填写（扩建项目名称为原项目名称后标注改扩建）。

    注2：项目位置：指设施农业项目所在地。登录后系统将自动获取项目所在省份、市（地、州）、县（市、区、旗）名称，手动填写具体乡（镇、街道）和村名称。

    注3：按照设施农业生产类型划分，包括作物种植（分粮食、蔬菜及其他）、畜禽养殖（分猪、鸡、牛、羊及其他）、水产养殖等情形。

    注4：指农村集体经济组织与经营者约定的设施农业用地使用起止时间。

    注5:：指设施农业项目使用土地总面积，相应上传用地拐点坐标。其中，粮食、香蕉、茶园等农业规模化生产，仅指看护房、农资农机具存放场所等为生产服务以及与生产直接关联的设施用地总面积。单位为公顷，保留小数点后4位；坐标系采用2000国家大地坐标系（下同）。

    注6：指设施农业项目使用农用地面积，地类依据最新的年度土地变更调查结果认定（下同）。单位为公顷，保留小数点后4位。

    注7：指设施农业项目使用耕地面积。单位为公顷，保留小数点后4位。

    注8：指设施农业项目使用耕地中涉及破坏耕地耕作层面积。单位为公顷，保留小数点后4位。

    注9：指设施农业项目使用永久基本农田面积，相应上传地块拐点坐标。单位为公顷，保留小数点后4位。

    注10：指设施农业项目使用永久基本农田中破坏耕地耕作层面积，相应上传地块拐点坐标。单位为公顷，保留小数点后4位。

    注11：指设施农业项目使用永久基本农田中破坏耕地耕作层、按要求补划的永久基本农田面积，相应上传地块拐点坐标。单位为公顷，保留小数点后4位。

    注12：指设施建成后，用地面积、位置等与此前取得用地阶段填写的信息发生变化，将变化信息予以备注说明。

    注13：指设施农业生产发生改扩建、续期、转为其他农业用途、停止生产等变更情形，按有关规定处置后，及时在监管系统中变更相关信息。'
