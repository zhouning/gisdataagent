    note: ''
  notes:
  - "注1：采用县级行政区划代码、行政区划名称，遵照GB/T 2260执行。\n注2：每个补充耕地图斑编号应具有唯一性，按照GB/T 7027规定的信息分类原则和方法，图斑编号采用五层21位层次码结构。1-15位为项目编号（非项目类为批次编号），由补充耕地类型、县级行政区划代码、验收年度、补充耕地顺序码组成；16-21位为图斑顺序码。具体如下：a)第一层为补充耕地类型代码，包括项目类和非项目类。项目类中，“Z”表示土地整治类，“G”表示高标准农田建设类，“J”表示城乡建设用地增减挂钩类，“Q”表示其他类。非项目类用“F”表示；\
    \ b)第二层为县级行政区划代码，参考 GB/T 2260 中规定的 6 位数字代码进行编码； c)第三层为验收年度，指补充耕地的验收年度； d)第四层为补充耕地顺序号，采用\
    \ 4 位数字码，码值：0001～9999； 第五层为图斑顺序号，采用 6 位数字码，码值：000001～999999。\n注3：地类编码和名称按《第三次全国国土调查技术规程》附录执行,填写最末级分类。\
    \ \n注4：图斑面积指用经过核定的地类图斑多边形边界内部所有地类的面积（如地类图斑含岛、孔，则扣除岛、孔的面积）。 \n注5：补充耕地面积是指经核定后的新增耕地数量。注6：补充耕地类型包含新增、提质改造。\
    \ \n注7：按照TD/T 1057-2020，填写耕地坡度级别。 \n注8：按照GB/T 28407-2012确定的划分标准，开展耕地分等调查评价，填写利用等。注9：按照GB/T\
    \ 33469-2016规定的评定标准，填写耕地质量等级。 \n注10：纳入补充耕地储备库年份。"
