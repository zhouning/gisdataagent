  notes:
  - '注1：针对整个方案，根据征收时序的时间区间填写，如填写年度2023。

    注2：片区编号为方案编号（12位）+片区顺序码（3位顺序号）。涉及整个成片开发方案调整时，空间位置未调整的片区仍采用原有编号。

    注3：填写到镇级，当一个片区跨越多个镇级行政区划时，用英文逗号隔开多个镇级行政区划代码。

    注4：总面积填写整个土地征收成片开发方案的总面积。

    注5：片区面积填写土地征收成片开发范围内的一个完整片区范围面积。

    注6：拟征收面积填写整个土地征收成片开发方案的拟征收总面积。

    注7：征收比例指整个土地征收成片开发方案内征收比例，在同一个土地征收成片开发方案的不同片区填写同一个值。以小数填写，如征收占比72.25%，则此项为72.25。

    注8：指各个片区的公益性用地面积及公益性比例，公益性比例以小数填写，如占比51.75%，则此项为51.75。

    注9：国有面积填写整个土地征收成片开发方案的国有用地总面积。

    注10：集体面积填写整个土地征收成片开发方案的集体用地总面积。

    注11：公益性用地面积填写整个土地征收成片开发方案的公益性用地总面积。'
