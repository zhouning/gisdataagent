  notes:
  - '注1：序号11-18字段属性值从土地利用数据库中地类图斑层提取；若地类图斑界线与基本农田保护片（块）界线重合，序号19-28字段属性值由计算机根据空间位置关系从土地利用数据库中地类图斑层直接提取；若基本农田保护片（块）界线分割地类图斑，被分割的图斑序号19-28字段属性值通过分割处理，按照《土地调查数据库更新技术规范》规定的方法重新计算后生成。

    注2：“基本农田图斑编号”由“保护片（块）编号+基本农田图斑（4位数字顺序码）”组成，以保护片（块）为单位，按从上到下，从左到右的顺序编号，下同。

    注3：“图斑编号”为土地利用数据库中地类图斑层中的图斑编号，不另行编号。

    注4：“座落单位代码”指该基本农田图斑实际座落单位的代码，当该基本农田图斑为飞入地时，实际座落单位的代码不同于权属单位的代码。

    注5：当地类为梯田耕地时，耕地类型填写“TT”，为坡地时，填写“PD”。

    注6：“扣除类型”指按田坎系数（TK）、按比例扣除的散列式其他非耕地系数（FG）或耕地系数（GD）。

    注7：“线状地物面积”指该基本农田图斑内所有线状地物的面积总和。

    注8：“扣除地类面积”：当扣除类型为“TK”时，扣除地类面积表示扣除的田坎面积；当扣除类型不为“TK”时，扣除地类面积表示按比例扣除的散列式其他地类面积。扣除地类面积=（基本农田图斑面积-线状地物面积-零星地物面积）*扣除系数

    注9：“基本农田图斑面积”指用经过核定的基本农田图斑多边形边界内部所有地类的面积（如基本农田图斑含岛、孔，则扣除岛、孔的面积）。

    注10：“基本农田面积”（即“基本农田图斑地类面积”或“基本农田图斑净面积”）=基本农田图斑面积-扣除地类面积-线状地物面积-零星地物面积。

    注11：从土地利用数据库中地类图斑层“地类备注”字段提取属性值。

    占用永久基本农田面积=（占用永久基本农田图斑面积/永久基本农田图斑面积）*永久基本农田面积。'
