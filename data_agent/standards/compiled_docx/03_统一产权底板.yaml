  notes:
  - '注1:在自然资源登记单元内按自然资源类型顺序编号，由10位数字组成，前5位为三次调查规程地类编码5位，在4位地类编码后以0补齐5位，后5位为顺序号(00001-99999)。

    注2:斑块对应的国土调查数据库的图斑标识码，按照TD/T1057的规则填写。下同

    注3:水流单元代码根据水流类型的不同，分别按照《中国河流代码》(SL249)、《湖泊代码》(SL261)、《中国水库名称代码》(SL259)的要求填写。

    注4:水流名称，首先依据中国河流代码(SL249)、中国水库名称代码(SL259)、湖泊代码(SL261)等国家行业标准规定的名称填写；国家行业标准未规定的，按照地方约定俗成的名称填写。

    注5:自然资源斑块的国有面积、集体面积与争议区面积通过与权属分区叠加计算获取，三者之和在水流资源斑块中等于该斑块的水面面积，在探明储量矿产资源斑块中等于该斑块的矿区/油气田总面积，在海域斑块中等于该斑块的海域面积，在无居民海岛斑块中等于该斑块的海岛面积，在其余自然资源斑块中直接等于该斑块的面积。

    注6:填写整条河流起点位置和讫点位置；被其他单元分开时，参照示例填写，如：若浙江千岛湖国家森林公园作为一个自然资源登记单元，其中的主要水流资源新安江干流，在“表15水流资源斑块属性结构描述表(属性表名：SZYBK)”中的河流起讫点：宜填写“起于安徽休宁县，讫于浙江省建德市。本单元内，新安江干流从浙江省淳安县威坪镇流入，经新安江水库，从浙江省淳安县千岛湖镇流出填写登记单元内该河流长度。

    注7:按照斑块范围内的自然资源专项调查成果的属性值域取并集罗列填写。湖泊/水库、冰川及永久积雪等不填此字段。对于斑块涉及的专项调查数据成果完全缺失造成整个斑块某一项属性无法填写的，以“-”表示。

    注8:按照斑块范围内的自然资源专项调查成果的面积占比汇总计算填写，计算结果保留与自然资源专项调查成果相同小数位数；对于斑块内涉及的专项调查数据成果部分缺失的不做推算处理；对于斑块涉及的专项调查数据成果完全缺失造成整个斑块某一项属性无法填写的，以“-”表示。小数点后保留2位，下同。

    注9:按照斑块范围内的自然资源专项调查成果的属性值域取并集按重要性或面积多少排序填写。对于斑块涉及的专项调查数据成果完全缺失造成整个斑块某一项属性无法填写的，以“-”表示。如水质按斑块面积大小排序分别为：“Ⅱ类”、“V类”,则该字段应填写：“Ⅱ类、V类”。其中填写范围参考GB/T14848。

    注10:按照斑块范围内的自然资源专项调查成果的面积占比汇总计算填写，计算结果保留与自然资源专项调查成果相同小数位数；对于斑块内涉及的专项调查数据成果部分缺失的不做推算处理；对于斑块涉及的专项调查数据成果完全缺失造成整个斑块某一项属性无法填写的，以“-”表示。填写河湖泊/水库的年初蓄水量，河流、冰川及永久积雪等不填此字段，以“-”表示。

    注11:依据全国国土调查的城镇村等用地图层信息填写201、202、203。下同'
