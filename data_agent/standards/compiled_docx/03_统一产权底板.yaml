  notes:
  - '注1:按《不动产单元设定与代码编制规则》(GB/T37346)要求填写，下同。

    注2:采用投资项目在线审批监管平台产生的项目代码，下同。

    注3:按照《国土空间用途管制数据规范》(TD/T1084)要求填写，下同。

    注4:可存储用于与规划、供应、利用、执法等各阶段业务管理号，编号规则遵从具体业务管理规定。涉及多个管理号的，用“,”分隔，下同。

    注5:土地用途按《土地利用现状分类》GB/T21010及相关规定执行，应填写本宗地内主要用途的二级类编码。士地用途名称应填写本宗地内所有用途的二级类名称，当有多个用途时，应使用“/”分开。当宗地权利类型为使用权时该字段必填，当宗地权利类型为所有权时该字段可不填。

    注6:代码4位，前2位表述等别，后2位表示级别，等别代码从0开始到15,级别代码从0到12。0表示未分等或级。

    注7:填写划拨决定书或者出让合同等文件确定的建筑容积率、建筑密度、建筑限高。容积率、建筑密度、建筑限高未在规划、合同等有关文件中进行确定或者变化过于频繁的，可以不填写。

    注8:填写年份/月份/日期，无日期的日期默认补充为1日，下同。填写多个竣工日期，用逗号分隔'
