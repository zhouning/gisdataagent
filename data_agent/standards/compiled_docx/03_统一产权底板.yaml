    注2:在分别持证的情况下，不动产权证号字段记录每一个权利人所持有的不动产权证书号；在共同持证的情况下，该字段的值相同。对于异议登记、查封登记、预告登记，该字段的含义为不动产登记证明号，土地承包经营权时亦可为农村土地承包经营权证流水号。

