      “行政区代码”栏，取“国土三调”“坐落单位代码”前6位。

      数据来源于地籍数据库、不动产登记信息管理基础平台，土地市场动态监测与监管系统、查清宗地使用权主体、类型、期限、权利变化等使用权相关属性信息。

      “宗地编号”栏，按宗地地籍号填写。

