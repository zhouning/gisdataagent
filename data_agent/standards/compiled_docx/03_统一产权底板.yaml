    注2:填写遥感影像图的分辨率(原始影像分辨率‘可选择填写’),如：0.2M(0.1M)。

    注3:拍摄时间按照“YYYYMMDD”格式填写。

    注4:填写正射影像图的比例尺分母。

    注5:2000国家大地坐标系等；

    注6:应填写“3度带高斯克吕格投影”或“6度带高斯克吕格投影”。

    注7:度分秒的小数表达方式。如117度0分0秒，应填写117.0000;117度18分25秒，应填写：117.1825。'
