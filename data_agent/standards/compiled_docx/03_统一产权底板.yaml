  notes:
  - '表注：

    以县级行政单元为单位填写，省级单位汇总全部下辖各县级单元数据后提交国家级汇总单位。本表用于填写在确定核算价格时，未制定基准地价地类的价格参照情况，如空闲地、水工建筑用地、采矿用地、交通运输用地、特殊用地等地类。

    “行政区名称”、“行政区代码”栏，根据清查时点年度国土变更调查成果中县级行政区划填写。

    “地类编码”、“地类名称”栏，根据第三次全国国土调查工作分类，细分至二级地类填写，应包括该县级行政单元所有未制定基准地价的地类。

    “参照地类编码”、“参照地类名称”栏，根据第三次全国国土调查工作分类，细分至二级地类填写，应为该县级行政单元已制定基准地价的地类。

    区域扩展代码填写新疆兵团、高新区等不在清查时点年度国土调查行政区划代码范围内的代码。

    “备注”栏，说明地类参照方法、参照系数等情况。'
