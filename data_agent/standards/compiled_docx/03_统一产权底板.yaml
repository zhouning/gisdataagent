    根据建设用地类型，按照商业服务业设施用地、物流仓储用地、工业用地、采矿用地、盐田、城镇住宅用地、农村宅基地、机关团体新闻出版用地、科教文卫用地、公用设施用地、公园与绿地、特殊用地、铁路用地、轨道交通用地、公路用地、城镇村道路用地、交通服务场站用地、机场用地、港口码头用地、管道运输用地、水工建筑用地、空闲地等22个二级地类分层存储均质区域价格信息，属性表命名为：商业服务业设施用地-SYFWYSSYD、物流仓储用地-WLCCYD、工业用地-GYYD、采矿用地-CKYD、盐田-YT、城镇住宅用地-CZZZYD、农村宅基地-NCZJD、机关团体新闻出版用地-JGTTXWCBYD、科教文卫用地-KJWWYD、公用设施用地-GYSSYD、公园与绿地-GYYLD、特殊用地-TSYD、铁路用地-TLYD、轨道交通用地-GDJTYD、公路用地-GLYD、城镇村道路用地-CZCDLYD、交通服务场站用地-JTFWCZYD、机场用地-JCYD、港口码头用地-GKMTYD、管道运输用地-GDYSYD、水工建筑用地-SGJZYD、空闲地-KXD。

    空间数据采用Shapefile格式，应包括主文件(*.SHP）、索引文件(*.SHX）、表文件(*.DBF）、投影信息文件(*.PRJ）。坐标系统统一采用“2000国家大地坐标系”，高程基准采用“1985国家高程基准”，投影方式采用“高斯-克吕格投影”，按3度分带，若投影跨3度带，则无需投影坐标系。

    数据要求拓扑一致性及空间上图规范性，包括矢量图层图斑不能相互重叠、不能自相交、不能有组合图斑、图斑不能超出本行政区外等。

    以县级行政单元为单位填写，省级单位形成全部下辖各县级单元数据一张图，提交国家级汇总单位。本表用于填写根据本轮清查工作要求，经调整、补充等处理后形成的核算价格，该价格体系应覆盖行政单元内的全部全民所有建设用地。

    若存在不同二级地类的全省图层相同，只需提交其中一个地类图层，并在“表B.2.1全民所有建设用地资源资产核算价格地类图层提交情况统计表”注明其他地类的参照情况。

    “核算价格级别”栏按照罗马数字1、2、3……顺序逐一填写。包括除现行基准地价体系外，本次清查工作中补充测算形成的级别。

    “级别面积”与“级别地价”栏按照与级别对应的内容填写。“级别地价”栏为地面地价。

    “年期”、“通平程度”、“容积率”均按照核算价格内涵的设定内容填写，如未设定容积率的，填写“无”，同时在“备注”填写“未设定容积率”。

    区域扩展代码填写新疆兵团、高新区等不在清查时点年度国土调查行政区划代码范围内的代码。'
