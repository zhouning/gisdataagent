  notes:
  - '表注：

    注1：以县级行政区为单位，填表至县级。

    注2：宗地位置，填写样点所在位置信息（精确到所在村名称或具体坐落位置）。

    注3：宗地坐标（经度）、宗地坐标（纬度），填写样点经纬度坐标信息（十进制），保留6位小数。

    注4：地类编码、地类名称，根据“国土三调”工作分类（调查成果），细分至二级地类填写。

    注5：权属性质，按照所有权主体填写国有或集体所有。

    注6：租赁方式，按照案例样点交易状况填写承包、转包、出租等。

    注7：交易对象，按照租入农地主体类型填写相应代码，编写规则为：“1-本村普通农户；2-本村种粮大户；3-本村家庭农场主；4-外来农户；5-合作社；6-企业；7国有农场；8-国资公司；9-国有农场职工；10-其他”。

    注8：总收益，是指用于农业生产过程中，每年平均的农业生产产品的收入，根据近三年产量和正常市场价格进行计算。

    注9：总投入，是指农用地维护费和生产农副产品的费用之和。农用地维护费一般指农用地基本配套设施的年平均维修费用；生产经营农副产品的费用一般包括生产农副产品过程中所支付的直接及间接费用，包括种苗费(或种子费、幼畜禽费)、肥料费(或饲料费)、人工费、畜工费、机工费、农药费、材料费、水电费、农舍费(或畜禽舍费)、农具费以及有关的税款、利息等。对于投入所形成的固定资产，按其使用年限摊销费用。

    注10：净收益=总收益-总投入。

    注11：农业补贴，生产主体每年得到政府用于补贴农业生产的总费用。

    注12：种养类型，按照实际生产用途填写全年具体的作物类型或养殖类型。例如，冬小麦、夏玉米一年两熟可填写“冬小麦、夏玉米”。

    注13：种养面积，按照实际生产情况填写全年生产该种养类型所投入的农用地总面积。

    注14：单位面积生产成本是填写实际生产用途下的成本情况。单位面积生产成本之和应等于“总投入”。

    注15：指定作物/主导作物经营情况，当耕地（或园地）样点地块种养类型与指定作物（或主导作物）不一致时填写。其中：

    作物类型，耕地填写标准耕作制度下的指定作物类型，园地填写当地普遍种植的主导农作物类型。例如，标准耕作制度为“冬小麦、夏玉米一年两熟”的地区可填写“冬小麦、夏玉米”。

    作物总产值，通过对周边同等条件地块调查，根据指定作物（主导作物）近三年产量和正常市场价格，填写指定作物（主导作物）亩均年产值。

    作物总成本，填写指定作物（主导作物）在农业生产过程中的农用地维护费和生产农副产品的费用之和。农用地维护费一般指农用地基本配套设施的年平均维修费用；生产经营农副产品的费用一般包括生产农副产品过程中所支付的直接及间接费用，包括种苗费(或种子费、幼畜禽费)、肥料费(或饲料费)、人工费、畜工费、机工费、农药费、材料费、水电费、农舍费(或畜禽舍费)、农具费以及有关的税款、利息等。对于投入所形成的固定资产，按其使用年限摊销费用。

    作物净收益=作物总产值-作物总成本。

    注16：样点具体情况，可在备注中说明。

    注17：本调查表仅用于全民所有自然资源资产清查工作，作为农用地核算价格测算依据。'
