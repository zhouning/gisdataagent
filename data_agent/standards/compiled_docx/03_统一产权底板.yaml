    length: '19'
    decimal: ''
    domain: 本表注18
    constraint: O
    note: ''
  - seq: ''
    name_cn: 备注
    code: BZ
    dtype: Text
    length: '254'
    decimal: '-'
    domain: ''
    constraint: O
    note: '-'
  notes:
  - '表注：

    本表以县级行政单元为单位填写，填表至宗地。

    本表根据地籍调查成果、确权登记成果、土地市场动态监测与监管信息平台数据，查清宗地使用权主体及类型、取得方式、年期、权利变化、利用现状、合同价款等使用权相关属性信息。表中行政区名称、行政区代码、宗地代码、宗地面积、坐落、地类编码、地类名称、对应的三调地类编码、对应的三调地类名称、是否登记、使用权人、使用权人类型、是否抵押根据地籍数据库、不动产登记数据库成果填报，当地籍数据库与不动产登记数据库成果不一致时，以现势性更高的不动产登记数据为准；合同编号、合同金额、合同签订时间、供应时间、供应方式、供应年限、已使用年限、容积率、闲置状态根据土地市场动态监测与监管系统数据填报，当使用权人信息与地籍数据库、不动产登记数据库成果不一致时，须备注说明。

    “地类编码”栏、“地类名称”栏，分别按地籍数据库、不动产登记数据库等成果中“用途”、“用途名称”填写。

    “对应的三调地类编码”、“对应的三调地类名称”栏，根据第三次全国国土调查工作分类，细分至二级地类填写，将“地类编码”、“地类名称”中涉及的各类全民所有建设用地地类均与“第三次全国国土调查”地类逐一对应。

    “是否登记“栏，根据地籍数据库、不动产登记数据库等成果中“登记状态”进行填写，已登记填写“1”，未登记填写“0”。

    “使用权人”栏，当使用权人类型是个人时，只需填写“个人”。

    “使用权人类型”栏，按地籍数据库、不动产登记数据库等成果中的“权利人类型”填写。

    “合同编号”栏，按照签订的合同号填写。

    “合同金额”栏，按合同签订的总金额填写。

    “合同签订时间”栏，按照合同签订时间填写。

    “供应时间”栏，按照合同中签订的出让起始时间填写。

    “供应方式”栏，按“划拨”、“出让”、“租赁”、“授权经营”、“作价出资（入股）”、“未供应”、“供应情况不明晰”等情况填写。

    “供应年限”栏，按合同签订的供应年期填写。

    “已使用年限”栏，按照截止清查时点的已使用年限填写。

    “容积率”栏，按合同或规划条件中约定的容积率填写。容积率若为区间值，则填写区间上限数值；仅有下限数值的（如工业用地），则填写下限数值。

    “是否抵押”栏，填“是”、“否”、“部分”。

    “闲置状态”栏，根据“土地市场监测监管系统”中“闲置状态”进行填报，填“是”、“否”。

    区域扩展代码填写新疆兵团、高新区等不在清查时点年度国土变更调查行政区划代码范围内的代码。

    因历史遗留问题造成土地使用权信息缺失的宗地，可结合行政管理记录对宗地使用权相关信息进行补充。

    无相关信息的栏目为空。'
