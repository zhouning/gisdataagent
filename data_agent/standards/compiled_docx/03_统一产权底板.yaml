    “划入城镇村范围同口径核算价格”依据资产清查价格，非建设用地使用工业用地末级地价。

    “划入城镇村范围同口径经济价值”中耕地为“划入城镇村范围面积”与“划入城镇村范围田坎面积”之和，再与“划入城镇村范围同口径核算价格”乘积，其余地类为“划入城镇村范围面积”、“划入城镇村范围同口径核算价格”乘积。

    缺省值见，下同。'
