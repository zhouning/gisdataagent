  notes:
  - '表注：

    以县级行政区为单位填报。

    宗地位置，填写样点所在位置信息（精确到所在村名称或农场名称）。

    宗地坐标（经度）、宗地坐标（纬度），填写样点经纬度坐标信息（十进制），保留6位小数。

    地类编码、地类名称，根据第三次全国国土调查工作分类，细分至二级地类填写。

    权属性质，按照所有权主体填写国有或集体所有。

    一次性转让方式，按照案例样点交易状况填写拍卖、联营入股等。

    总收益，是指用于农业生产过程中，实际用途下每年平均的农业生产产品的收入，根据近三年产量和正常市场价格进行计算。

    总投入，是指实际用途下农用地维护费和生产农副产品的费用之和。农用地维护费一般指农用地基本配套设施的年平均维修费用；生产经营农副产品的费用一般包括生产农副产品过程中所支付的直接及间接费用，包括种苗费（或种子费、幼畜禽费）、肥料费（或饲料费）、人工费、畜工费、机工费、农药费、材料费、水电费、农舍费（或畜禽舍费）、农具费以及有关的税款、利息等。对于投入所形成的固定资产，按其使用年限摊销费用。

    净收益=总收益-总投入。

    农业补贴，生产主体每年得到政府用于补贴农业生产的总费用。

    种养类型，按照实际生产用途填写全年具体的作物类型或养殖类型。例如，种植为“冬小麦、夏玉米一年两熟”的地区可填写“冬小麦、夏玉米”。

    种养面积，按照实际生产情况填写全年生产该种养类型所投入的农用地总面积。

    单位面积生产成本是填写实际生产用途下的成本情况。单位面积生产成本之和应等于“总投入”。

    指定作物/主导作物经营情况，当耕地（或园地）样点地块种养类型与指定作物（或主导作物）不一致时填写。填写样点周边指定作物（或主导作物）种植地块的经营状况信息。其中：

    作物类型，耕地填写标准耕作制度下的指定作物类型，园地填写当地普遍种植的主导农作物类型。例如，标准耕作制度为“冬小麦、夏玉米一年两熟”的地区可填写“冬小麦、夏玉米”。

    总产值，通过对周边同等条件地块调查，根据指定作物（或主导作物）近三年产量和正常市场价格，填写指定作物（或主导作物）亩均年产值。

    总成本，填写指定作物（或主导作物）在农业生产过程中的农用地维护费和生产农副产品的费用之和。农用地维护费一般指农用地基本配套设施的年平均维修费用；生产经营农副产品的费用一般包括生产农副产品过程中所支付的直接及间接费用，包括种苗费、肥料费、人工费、机工费、农药费、材料费、水电费、农具费以及有关的税款、利息等。对于投入所形成的固定资产，按其使用年限摊销费用。

    净收益，作物净收益=作物总产值-作物总成本。

    样点具体情况，可在备注中说明。

    本调查表仅用于全民所有自然资源资产清查工作，作为农用地核算价格测算依据。'
