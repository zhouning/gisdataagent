  notes:
  - '表注：

    以县级行政区为清查单位，填表至图斑。

    “行政区代码”、“行政区名称”，按县级行政区填写。

    “林业局”、“林场”、“普查图斑编码”、“普查地类”来源于“全国森林草原湿地荒漠化普查”数据。“普查地类”按“地类”填写。“普查图斑编码”采用15位层次码结构，由县级行政区划代码、林（草）班、小班号构成；具体如下：第一层为县级行政区划代码，采用GB/T2260中规定的数字代码6位数字码，第二层为林（草）班数据，不足四位的在数值前补零，第三层为小班号数据，不足五位的在数值前补零；

    “子图斑面积”栏，按照“全国森林草原湿地荒漠化普查”数据库中“小班面积”填写。

    “国土变更调查土地权属”栏，以“国土变更调查”数据“权属性质”为准。“林木所有权”栏，以“全国森林草原湿地荒漠化普查”数据“林木所有权属”为准。

    “平均胸径”单位：cm，“平均树高”单位：m，“每公顷株数”单位：株，“子图斑蓄积”单位：m³。

    “林地等”、数据来源于“全国林地分等”成果，优先填报国家级等别。

    “划入城镇开发边界面积”，填写子图斑范围内划入城镇开发边界实际面积。

    属于飞入地的图斑标注“1”，否则标注“0”或为空。飞地按照‘飞出地调查、飞入地汇总’的原则开展调查，各地也可根据实际情况协商调查，保证调查成果不重不漏。

    区域扩展代码填写新疆兵团、高新区等不在2023年底高新区等不在2023年底变更调查行政区划代码范围内的代码。

    缺省值见，下同。'
