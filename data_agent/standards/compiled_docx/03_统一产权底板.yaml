    注3：“理论载畜量”单位：羊单位/公顷。通过计算获得，即在适度利用草地的强度下，建议饲养的家畜数量；不同家畜种类可以按照采食量折算为羊单位。计算公式参照《天然草地合理载畜量的计算》（NY/T635-2015）。

