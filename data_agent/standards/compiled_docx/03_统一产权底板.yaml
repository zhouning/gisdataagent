    “用海类型”，根据证书填写一级类用海类型；

    “宗海面积”，根据证书填写，单位：公顷，保留四位小数；

    “用海方式”、“用海面积”，根据证书填写二级类用海方式和该方式对应的图斑面积。若项目涉及多种用海方式，则根据用海方式依次填写用海方式1和该用海方式对应的用海面积1、用海方式2和该用海方式对应的用海面积2，用海方式3和该用海方式对应的用海面积3，涉及几种用海方式则填写几次；

    “出让价”，根据海域使用金费源清册填写合同的出让价款，计量单位：万元，保留两位小数；

    “用海年限”，根据用海起始时间和终止时间填写，不满1年则填写0.5年；

    “出让单价”，根据“出让价”、“宗海面积”和“用海年限”填写，单位为万元/公顷/年，保留两位小数。

