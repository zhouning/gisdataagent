  notes:
  - '表注：

    以县级行政区为清查单位，填表至图斑。

    “行政区名称”、“行政区代码”，按县级行政区填写。

    “国土调查标识码”，按“国土变更调查”数据库中“标识码”填写。

    “国土调查图斑编号”，按“国土变更调查”数据库中“图斑编号”填写。

    “地类编码”、“地类名称”，按“国土变更调查”数据库中“地类编码”、“地类名称”填写。

    “权属单位代码”、“权属单位名称”字段按国土变更调查中的“权属单位代码”、“权属单位名称”字段填写。

    “坐落单位名称”、“坐落单位代码”，按“国土变更调查”数据库中“坐落单位名称”、“坐落单位代码”填写。

    “耕地质量等级”，根据最新的耕地质量等别年度更新评价成果，按图斑对应的“国家利用等”填写，值域范围[1,15]。图斑内无等别信息的部分，参考技术指南“十三、空间数据整合”处理并填写相应等别信息。

    “耕地质量分类代码”，根据最新耕地资源分区分类评价（耕地资源质量分类年度更新与监测成果），按图斑对应的“质量分类代码”填写。

    “省级园地等别”、“国家级园地等别”栏，根据园地分等成果，按图斑对应的“省级园地等别”、“国家级园地等别”填写。

    “种植属性名称”栏，按“国土变更调查”数据库中“种植属性名称”填写。

    “图斑地类面积”，按“国土变更调查”数据库中各图斑对应的“图斑地类面积”填写。

    “田坎面积”，按“国土变更调查”数据库中各图斑对应的“扣除地类面积”填写。

    “划入城镇开发边界面积”，填写图斑范围内的城镇开发边界面积。“划入永久基本农田保护红线面积”，填写图斑范围内的永久基本农田保护红线面积。

    “核算价格”，按照选取的核算方法，填写对应的图斑价格信息，计量单位为元/亩，数值四舍五入保留整数。

    “清查单元经济价值”，计量单位为元，数值四舍五入取整。清查单元经济价值=核算价格×图斑地类面积×0.0015。

    “核算价格确定方法”，当地类为耕地、园地、设施农用地和养殖坑塘时填写对应地类的价格核算方法代码，代码见。

    属于飞入地的图斑标注“1”，否则标注“0”或为空。飞地按照‘飞出地调查、飞入地汇总’的原则开展调查，各地也可根据实际情况协商调查，保证调查成果不重不漏。下同。

    区域扩展代码填写新疆兵团、高新区等不在2023年底国土变更调查行政区代码范围内的代码

    缺省值见，下同。'
