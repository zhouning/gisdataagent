    以县级行政单元为单位填写，省级单位汇总全部下辖各县级单元数据后提交国家级汇总单位。

    本表用于调查县级行政单元辖区内县（市、区）本级辖区空间上的现行基准地价数据（不包括其下辖乡镇或园区等自成体系的基准地价成果）。包括已形成成果，但尚未公布的基准地价，尚未公布的在备注中注明＂未公布＂。本次只填报2020年以后更新的基准地价成果。

    “行政区名称”、“行政区代码”栏，根据清查时点年度国土变更调查成果中县级行政区划填写。

    “地类编码”、“地类名称”栏，根据第三次全国国土调查工作分类，细分至二级地类填写，将基准地价体系中涉及的各类全民所有建设用地地类均与“第三次全国国土调查”地类逐一对应。

    “最高级别地价”、“最低级别地价”、“地类平均地价”均为地面地价，若当地基准地价体系以楼面价表达时，需根据基准地价内涵中的设定容积率将其换算为地面地价。

    “地类平均地价”栏，按基准地价体系中，本用途各级别面积加权计算所得的该用途平均地价。

    “使用权类型”、“年期”、“通平程度”、“容积率”、“基准日”栏，均按照基准地价内涵的设定内容填写，若不同级别对应的通平程度、容积率等参数不同，按最高级别对应的参数填写，并在备注中标注“级别间XX内涵有差异”字样；如果地价对应的权利内涵有特殊限制（例如租赁住宅地价、不可分割转让等），应在备注中说明。

    区域扩展代码填写新疆兵团、高新区等不在清查时点年度国土变更调查行政区划代码范围内的代码。'
