  notes:
  - '表注：

    以县级、市本级、省本级为清查单位，仅填报行政区本级未确定使用权人国有建设用地数据（不汇总下级行政区数据），适用于所有未确定使用权人国有建设用地。

    “规划用途”栏，按照规划成果确定的用途，依据GB/T21010进行界定。包含多种用途的，逐一分行填写。在地块空间范围与规划成果叠加时，明显是因为规划边界与地块边界存在误差，而导致形成的细碎图斑，该细碎图斑又无规划条件时，其规划用途可按照相邻的未确定使用权人国有建设用地规划用途确定；其他无明确规划土地用途的情形，填写“无”。

    “分用途面积”栏，包含多种用途的，按照该地块在规划中各用途对应的土地面积逐一填写。当无明确土地规划用途时，填写无土地规划用途部分对应的土地面积。计量单位为公顷，保留六位小数。

    “规划容积率（分用途）”栏，条件必填，若有地块分用途容积率，则按照分用途容积率逐一填写；若无地块分用途容积率，此栏无需填写，按照地块容积率在A.5.1.1中填写“规划容积率（地块）”。每种用途占地平面空间界址不明确的混合用地，按整体容积率确定。在地块空间范围与规划成果叠加时，明显是因为规划边界与地块边界存在误差，而导致形成的细碎图斑，该细碎图斑又无规划条件时，其规划容积率可按照相邻的未确定使用权人国有建设用地规划容积率确定；其他无明确规划容积率的情形，填写“无”。

    “资产清查价格”栏，按核算的经济价值单价填写，计量单位为万元/公顷，保留两位小数。

    区域扩展代码填写新疆兵团、高新区等不在2023年底变更调查行政区划代码范围内的代码。

    表A.5.1.1与A.5.1.2为主子表关系，前者作为主表是空间属性表，后者作为子表是非空间属性表。“资产清查标识码（关联）”栏，作为关联主表的字段，填写表A.5.1.1中的资产清查标识码。'
