    本表关键字是“油气田编码”+“矿产代码”+“类型代码”+“质量描述”。

    “资产核算价格”、“价格计量单位”数据来源于《矿产资源资产核算价格标准表》，“地区调整系数”、“伴生矿调整系数”数据来源于《资产核算价格标准地区调整系数表》。

