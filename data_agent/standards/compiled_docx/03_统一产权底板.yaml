  - '注1:自然资源登记单元号应按《自然资源确权登记操作指南(试行)》执行，下同。

    注2:自然资源登记单元号支号采用3位顺序码，顺序号3位(001-999),无支号可不填写，下同。

    注3:当自然资源登记单元类型无法详细至二级类时，填写一级类代码。

    注4:坐落按“省(区、市)市(区)县(市、区)”填写。

    注5:按照TD/T1055附录D图幅理论面积与图斑椭球面积计算公式及要求的规定，由国土调查图斑椭球面积累加计算。涉及图斑分割的，按分割比例计算椭球面积，下同。本文件涉及面积字段，如无特殊说明，均为调查面积。

    注6:填写批准的登记单元所有国土面积总和。如无批准面积，可不填写。

    注7:登记单元范围内是否包含永久基本农田。0表示不包含，1表示包含。

    注8:登记单元范围是否与生态红线范围有交集。0表示没有交集，1表示有交集。

    注9:YYYYMMDD格式填写，按此登记单元的自然资源调查表最终形成时间填写。

    注10:表达本条记录的状态，0表示历史，1表示现势，下同。'
