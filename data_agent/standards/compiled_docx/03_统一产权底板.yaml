    注4:按照斑块范围内的自然资源专项调查成果的面积占比汇总计算填写，计算结果保留与自然资源专项调查成果相同小数位数；对于斑块内涉及的专项调查数据成果部分缺失的不做推算处理；对于斑块涉及的专项调查数据成果完全缺失造成整个斑块某一项属性无法填写的，以“-”表示。'
