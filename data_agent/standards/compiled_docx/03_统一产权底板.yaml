    注2:依据全国湿地资源调查成果分别填写登记单元内：红树林地、森林沼泽、灌丛沼泽、沼泽草地、沿海滩涂、内陆滩涂、沼泽地覆的主要优势植物建群种。

    注3:依据全国湿地资源调查成果、国家林草局迁徙鸟类调查监测数据填写经常栖息于此湿地的国家重点保护的湿地鸟类种类。

    注4:依据全国湿地资源调查成果、国际重要湿地调查监测数据、全国水资源调查评价、水质监测等成果分别填写登记单元内：红树林地、森林沼泽、灌丛沼泽、沼泽草地、沿海滩涂、内陆滩涂、沼泽地中水资源的水质类别，分：I类、Ⅱ类、Ⅲ类、IV类、V类、劣V类，可以是一个区间范围，如Ⅱ类-III类。

    注5:依据全国湿地资源调查成果分别填写登记单元内：红树林地、森林沼泽、灌丛沼泽、沼泽草地、沿海滩涂、内陆滩涂、沼泽地中水资源的水源补给状况，依据《第二次湿地调查技术规程》分为：地表径流补给、大气降水补给、地下水补给、人工补给、综合补给。'
