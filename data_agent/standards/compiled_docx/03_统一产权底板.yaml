  notes:
  - '表注：

    以县级行政单元为单位填写，填表至宗地。当为国有农场、国有单位管理的国有农用地时，填写国有农用地的使用权相关信息；当为交由集体种植的国有农用地，其管理方式与集体农用地相同，填写土地承包经营权相关信息；对于国有农场、国有单位管理的国有农用地，允许农场或职工流转给非农场员工时，或交由集体种植的国有农用地发生土地流转时，应填写土地经营权相关信息。此外，应注意，宗地信息结果表中所有数据，均来自已有的地籍调查成果（确权登记成果）、农村土地承包经营权登记成果、国有农场的使用权确权成果，不再进行补充调查。

    “行政区代码”栏，填写清查的县级单位“行政区代码”。

    “行政区名称”栏，填写清查的县级单位“行政区名称”。

    “宗地代码”栏，按地籍数据库、不动产登记数据库中“宗地代码”填写。若为农村土地承包经营权确权成果中提取的宗地，可不填写。

    “用途”栏、“用途名称”栏，分别按地籍数据库、不动产登记数据库中“用途”、“用途名称”填写。若为农村土地承包经营权确权成果中提取的宗地，可不填写。

    “对应的三调地类编码”栏，填写对应的“第三次全国国土调查”土地利用分类的地类编码。

    “对应的三调地类名称”栏，填写对应的“第三次全国国土调查”土地利用分类的地类名称。

    “宗地面积”栏，按地籍数据库、不动产登记数据库中“宗地面积”填写，单位与地籍数据库（确权登记数据库）保持一致或按农村土地承包经营权登记数据库、不动产登记数据库中“实测面积”填写，单位应与地籍数据库转换一致。

    “坐落”栏，按地籍数据库、不动产登记数据库中“坐落”填写。基于农村土地承包经营权登记成果开展使用权状况清查时，“坐落”栏地块所处行政村名字填写。

    “权利类型”栏，根据全民所有农用地权利类型填写，填写国有农用地的使用权或土地承包经营权。

    当为国有农用地的使用权时，填写序号13-18相关字段。其中：

    “使用权权利人名称”栏，“使用权权利人类型”栏，分别按地籍数据库、不动产登记数据库的“权利人名称”、“权利人类型”填写。“权利人类型”包括个人、企业、事业单位、国家机关、家庭金融机构、非金融机构、土地储备机构、其他等几种类型。

    “使用权取得方式”栏，按地籍数据库、不动产登记数据库的“权利性质”填写，包括划拨、出让、作价出资（入股）、国有土地租赁、授权经营、家庭承包、其他方式承包等几种方式。

    “使用权起始时间”栏、“使用权结束时间”栏，分别按地籍数据库、不动产登记数据库中“承包（使用）起始时间”、“承包（使用）结束时间”填写。

    “使用权是否登记”栏，根据地籍数据库、不动产登记数据库中“登记状态”进行填写，已登记填写“1”，未登记填写“0”。

    当为土地承包经营权时，填写序号19-30相关字段。其中：

    “地块代码”、“土地用途”栏，当为农村土地承包经营权登记数据库中宗地时填写。“地块代码”按农村土地承包经营权登记数据库中的“地块代码”进行填写，“土地用途”按农村土地承包经营权登记数据库中的土地用途进行填写，可分为“种植业”、“林业”、“畜牧业”、“渔业”、“非农业用途”。

    “发包方名称”栏，按地籍数据库或农村土地承包经营权登记数据库中“发包方名称”填写。

    “承包方名称”栏，按地籍数据库、不动产登记数据库中“权利人名称”或农村土地承包经营权登记数据库中的“承包方（代表）名称”填写。

    “承包方类型”栏，按地籍数据库、不动产登记数据库中“权利人类型”或农村土地承包经营权登记数据库中的“承包方类型”填写，包括个人、企业、事业单位、国家机关、家庭金融机构、非金融机构、土地储备机构、其他等几种类型。

    “承包合同代码”栏，按地籍数据库、不动产登记数据库中“承包合同代码”或农村土地承包经营权登记数据库中的“承包合同代码”填写。

    “承包经营权取得方式”栏，按地籍数据库、不动产登记数据库中“承包经营权取得方式”或农村土地承包经营权登记数据库中的“承包经营权取得方式”填写，包括家庭承包、招标、拍卖、公开协商、其他方式承包、转让、互换、其他等几种取得方式。“承包起始时间”栏、“承包结束时间”栏、“承包期限”栏，分别按地籍数据库、不动产登记数据库中“承包（使用）起始时间”、“承包（使用）结束时间”、“承包期限”或农村土地承包经营权登记数据库中的“承包期限起”、“承包期限止”填写。

    “承包价格”栏，指单位或个人通过公开竞价等方式获得的国有农用地的使用权的价格。填写多年算数平均值，单位为元/亩/年，数值取整。

    “承包经营权是否登记”栏，根据地籍数据库、不动产登记数据库中“登记状态”进行填写，已登记填写“1”，未登记填写“0”。

    当为土地经营权时，填写序号31-35相关字段。其中：

    “流转合同代码”栏，按地籍数据库、不动产登记数据库中“流转合同代码”或农村土地承包经营权登记数据库中的“流转合同代码”填写。

    “流转期限起始时间”栏，“流转期限结束时间”栏，分别按地籍数据库、不动产登记数据库中“经营权起始时间”、“经营权结束时间”或农村土地承包经营权登记数据库中的“流转期限开始时间”、“流转期限结束时间”填写。

    “流转价格”栏，是由集体或其他经济组织种植的国有农用地，再流转时的价格，单位为元/亩/年，数值取整。

    “土地经营权是否登记”栏，按地籍数据库、不动产登记数据库“登记时间”进行判断填写，已登记填写“1”，未登记填写“0”。

    “是否抵押”，填“是、否”。

    “亩均种植纯收益”栏，指农用地多年种植平均纯收益，单位为元/亩/年，数值取整。'
