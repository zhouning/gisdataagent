    注2:本字段存储点之记影像文件所在的物理路径及文件名。在数据交换时需要将本字段指向的文件复制到存储交换数据文件的物理路径，同时将本字段的物理路径值转换为存储交换数据文件的物理路径值；本文件中所有Varbin类型字段均同此含义。

    注3:控制点的X坐标值、Y坐标值、Z坐标值采用2000国家大地坐标系下的高斯-克吕格投影平面坐标和1985国家高程基准，单位为米，小数点保留3位。'
