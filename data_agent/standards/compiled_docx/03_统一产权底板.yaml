  notes:
  - '表注：

    以县级、市本级、省本级为清查单位，仅填报行政区本级未确定使用权人国有建设用地数据（不汇总下级行政区数据），适用于所有未确定使用权人国有建设用地。

    “行政区名称”栏，填写地块所在县级及以上的行政区名称。

    “行政区代码”栏，填写地块所在县级及以上的行政区代码。

    “地块代管主体”栏，填写土地储备机构、开发区（园区）管委会、国有平台公司、基层政府或有关单位的具体名称的全称。

    “地块编号”栏，按照地方自然资源主管部门自行统一对地块编号填写，不重复。

    “地块名称”栏，按照地方自然资源主管部门自行统一对地块命名的名称填写。

    “跨行政区情况”栏，条件必填，地块存在跨行政区情形的填“1”，否则填“0”或为空。

    “跨行政区名称”栏，条件必填，存在跨行政区情形，即“跨行政区情况”字段属性值为“1”情况下，该字段应逐个列出地块所跨的多个行政区名称。

    “收储/取得时间”栏按照地块收储或取得时间填写，具体到X年X月X日。

    “地块面积”栏，按照实际收储面积填写。计量单位为公顷，保留六位小数。

    “规划容积率（地块）”栏，条件必填，若有地块分用途容积率，此栏无需填写，按照分用途容积率逐一在表A.5.1.2中填写“规划容积率（分用途）”；若无地块分用途容积率，则按照地块容积率填写此栏，表A.5.1.2中“规划容积率（分用途）”无需填写。每种用途占地平面空间界址不明确的混合用地，按整体容积率确定。在地块空间范围与规划成果叠加时，明显是因为规划边界与未确定使用权人国有建设用地地块边界存在误差，而导致形成的细碎图斑，该细碎图斑又无规划条件时，其规划容积率可按照相邻的未确定使用权人国有建设用地规划容积率确定；其他无明确规划容积率的情形，填写“无”。

    “地块成本”栏，指账面成本，按照实际已经发生的成本据实确定，计量单位为万元，保留两位小数。账面成本与客观土地成本明显差异过大，或无账面成本的，采用所在区域客观土地成本估算。规划用途为公园、绿地、道路、广场的未确定使用权人国有建设用地，在土地取得、前期开发过程中发生的成本支出，原则上由产生经济收入的经营性土地来分摊，可按0核算和统计成本。规划用途为机关团体、教育、医疗卫生、社会福利、文化设施、体育、交通服务场站、公用设施、军事设施、使领馆、监教场所、宗教等的未确定使用权人国有建设用地，原则上按照经营性土地的平均土地储备或取得成本的一定比例分摊确定成本，具体比例由当地自行确定。

    “经济价值测算方法”栏，采用建设用地资源资产清查价格体系的，填写“建设用地资源资产清查价格体系修正法”；采用实际发生成本的，填写“成本法”。

    “核算价格”栏，按核算的经济价值单价填写，计量单位为万元/公顷，保留两位小数。

    “经济价值”栏，按核算的经济价值总价填写。计量单位为万元，保留两位小数。

    缺省值见，下同。'
