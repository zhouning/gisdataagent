    注3：本表关键字是“储量登记分类编号”+“矿区编号”+“矿山（井、孔）编号”+“矿产代码”+“储量级别”+“水质名称”+“水质数值”。

    注4：“实物量”根据《资产核算价格标准地区调整系数表》中对应的价格标准计量单位所表示的计算对象选择实物量类型，同时根据计量单位进行相关的计量单位换算。其中，“实物量类型”选择“取水量”、“热能”、“电能”其中之一；“计量单位转换系数”填写与资产核算价格标准计量单位一致的转换系数，“数量”为确定“实物量类型”中对应储量，并转换计量单位后的数值。

    注5：“资产核算价格”、“价格计量单位”等数据来源于《矿产资源资产核算价格标准表》,“地区调整系数”数据来源于《资产核算价格标准地区调整系数表》。

    注6：“经济价值”按《技术指南》方法核算。

    注7：“行政区代码”、“行政区名称”、“管理部门”栏，按实际清查情况填写。

    注8：如果“储量计算坐标中心点”缺失，则首先利用“储量计算坐标”计量出中心坐标；如果“储量计算坐标”缺失或错误，则采用所在地（村、镇、县）中心坐标替代，优先顺序先村、镇、县。

    注9：区域扩展代码填写新疆兵团、高新区等不在2023年底变更调查行政区划代码范围内的代码。'
