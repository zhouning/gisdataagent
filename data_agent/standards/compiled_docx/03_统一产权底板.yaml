  notes:
  - '适用于尚未开展海域定级，仅制定了养殖用海使用金征收标准的省（区、市）根据海域等别划分情况分条填写。

    “行政区划名称”、“行政区划代码”，按照《中华人民共和国行政区划代码》填写县（区、市）行政区划名称或代码。

    “海域等别”，根据地方养殖用海使用金征收标准填写，其中标准中没有区分等别的，根据《调整海域无居民海岛使用金征收标准》（财综[2018]15号）填写。

    用海方式1”、“用海方式2”、“用海方式3”，根据地方养殖用海使用金征收标准制定情况分别填写一级类、二级类、三级类用海方式。其中，用海方式与国家分类不一致的，根据地方养殖用海使用金征收标准的分类方式分条填写。采用用海类型进行分类应在备注中说明情况。有其他用海方式使用金征收标准的，自行补充。

    “征收标准”，与用海方式依次对应填写，存在几种用海方式则依次填写几种征收标准。单位：万元/公顷。

    “征收方式”，与用海方式、用海标准依次对应填写，分为一次性征收或按年度征收两种情况。

    “区域扩展代码”，填写新疆兵团、高新区等不在2023年底国土变更调查行政区代码范围内的代码。

    “备注”，填写需要进一步说明的有关信息。'
