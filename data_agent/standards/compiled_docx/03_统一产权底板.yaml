    “是否登记”栏，根据地籍数据库、不动产登记数据库等成果中“登记状态”进行填写，已登记填写“1”，未登记填写“0”。

    “供应方式”栏，按“划拨”、“出让”、“租赁”、“授权经营”、“作价出资（入股）”、“未供应”、“供应情况不明晰”、“租赁”、“承包经营”等。

    “批准用途”栏，存在合同或其他批准文件的需要填写，按照签订的合同或其他批准文件上注明的批准用途填写。

    “合同金额”栏，存在合同或其他批准文件的需要填写，按照签订的合同或其他批准文件上注明的收入填写。

    “供应时间”栏，存在合同或其他批准文件的需要填写，按照签订的合同或其他批准文件上注明的批准时间填写。

    区域扩展代码填写新疆兵团、高新区等不在2023年底变更调查行政区划代码范围内的代码。'
