    “行政区代码”、“行政区名称”、“管理部门”栏，按实际清查情况填写。

    如果“储量计算坐标中心点”缺失，则首先利用“储量计算坐标”计量出中心坐标；如果“储量计算坐标”缺失或错误，则采用所在地（村、镇、县）中心坐标替代，优先顺序先村、镇、县。

    区域扩展代码填写新疆兵团、高新区等不在2023年底变更调查行政区划代码范围内的代码。

    缺省值见，下同。'
