  notes:
  - '注1：标识码、要素代码、地类编码、地类名称、权属性质、权属单位代码、权属单位名称、坐落单位代码、坐落单位名称继承于最新国土变更调查数据库。草原类、草原型为选填，可通过森林、草原、湿地调查监测数据获取，参照《森林、草原、湿地调查监测技术规程》附录A.39草地类型填写。

    注2：草地定级单元可在最新国土变更调查的基础上进行细化、破斑。图斑来源填写生成图斑所叠加的数据名称， 未细化破斑图斑来源字段可不填。单元编号前18位取自国土变更调查与BSM保持一致，后4位为自然顺序编码,
    如图斑范围与变更调查范围一致未破斑“图斑编号”为BSM+0001，如破斑为2块“图斑编号”分别为BSM+0001、BSM+0002，单元编号在草地定级矢量数据库中取值唯一。

    注3：若图斑范围与变更调查范围一致未破斑，定级图斑面积继承国土变更调查图斑面积；若图斑为分割小斑，定级图斑面积按照面积占比法计算各个分割小斑面积，各分割小斑面积之和应与变更调查原始斑块图斑面积一致，不一致需进行平差处理。

    注4：图斑是飞入地填写“1”，不是飞入地填写“0”，当该地类图斑飞入地时，实际坐落单位的代码与权属单位代码不同。

    注5：数据年份字段填写选用变更调查底图数据年份（2021、2022）。

    注6：当是否原有成果转换字段填写“否”，地类名称为“天然牧草地”时，年均气温、年均气温分值、年均降水量、年均降水量分值、土层厚度、土层厚度分值、土壤有机质、土壤有机质分值、坡度、坡度分值、产草量、产草量分值、单位面积可食牧草量、单位面积可食牧草量分值、道路通达度、道路通达度分值为必填；植被
    退化、草地沙化和草地盐渍化，可结合实际情况进行选择，至少填写其中一项；多年生物种数量与物种丰富 度指数，至少填写一项。

    注7：当是否原有成果转换字段填写“否”，地类名称为“人工牧草地”时，年均气温、年均气温分值、年均降水量、年均降水量分值、土层厚度、土层厚度分值、土壤有机质、土壤有机质分值、坡度、坡度分值、产草量、产草量分值、单位面积可食牧草量、单位面积可食牧草量分值、道路通达度、道路通达度分值为必填；

    注8：当是否原有成果转换字段填写“否”，地类名称为“其他草地”时，土层厚度、土层厚度分值、土壤有机质、土壤有机质分值、产草量、产草量分值、坡度、坡度分值、距水源地距离、距水源地距离分值、道路通达度、道路通达度分值为必填；

    注9：当是否原有成果转换字段填写“是”，年均气温、年均气温分值、年均降水量、年均降水量分值、土层厚度、土层厚度分值、土壤有机质、土壤有机质分值、坡度、坡度分值、坡向、坡向分值、产草量、产草量分值、
    单位面积可食牧草量、单位面积可食牧草量分值、距水源地距离、距水源地距离分值、多年生物种数量、多 年生物种数量分值、物种丰富度指数、物种丰富度指数分值、植被退化、植被退化分值、草地沙化、草地沙
    化分值、草地盐渍化、草地盐渍化分值、道路通达度、道路通达度分值、定级单元分值可不填。

    注10：园地、林地、草地定级指标体系一般在必选和备选指标中选择，必选指标应全部纳入评价体系，备选指标酌情纳入，对当地级别划定确实有显著影响的其他指标，在充分论证后可纳入，指标数量不超过2个。新增指标1、新增指标2为地方自行纳入的评价指标，若纳入评价指标体系，指标名称、内涵需在“备注”字段说明。

    注11：当是否原有成果转换字段填写“否”，定级单元分值为必填。

    注12：是否原有成果转换：原有农用地定级估价成果转换的填写“是”，否则填“否”。'
