  notes:
  - "注1：标识码、要素代码、地类编码、地类名称、权属性质、权属单位代码、权属单位名称、坐落单位代码、坐落单位名称、定级图斑面积继承于最新年度国土变更调查。\n\
    注2：图斑来源填写“2021年度国土变更调查数据”或“2022年度国土变更调查数据”。\n注3：单元编号前18位取自标识码字段，后4位为0001。\n注4：图斑是飞入地填写“1”，不是飞入地填写“0”，当该地类图斑飞入地时，实际坐落单位的代码与权属单位代码不同。\n\
    注5：数据年份字段填写选用变更调查底图数据年份（2021、2022）。 \n注6：定级方法：因素法、修正法。若是否原有成果转换字段填写“是”，定级方法字段可不填。\
    \ \n注7：若是否原有成果转换字段填写为“否”且地类名称为“果园”和“茶园”时，坡向为必选指标。坡向分值为 必填。 \n注8：是否原有成果转换字段填写“是”为原有农用地转化成果，其中定级方法、有效土层厚度、有效土层厚度分\
    \ 值、土壤PH值、土壤PH值分值、土壤有机质含量、土壤有机质含量分值、土壤质地、土壤质地分值、坡度、 坡度分值、水源保证率、水源保证率分值、水源保证率修正系数、田间路网、田间路网分值、田间路网修正\
    \ 系数、中心城市影响度、中心城市影响度分值、中心城市影响度修正系数、对外交通便利度、对外交通便利度分值、对外交通便利度修正系数、道路通达度、道路通达度分值、道路通达度修正系数、分等单元分值、\
    \ 定级单元分值可不填。 \n注9：是否原有成果转换字段填写“否”，若采用“因素法”定级时，定级方法、有效土层厚度、有效土层厚度分值、土壤PH值、土壤PH值分值、土壤有机质含量、土壤有机质含量分值、土壤质地、土壤质地分值、坡度、\
    \ 坡度分值、水源保证率、水源保证率分值、田间路网、田间路网分值、中心城市影响度、中心城市影响度分值、对外交通便利度、对外交通便利度分值、道路通达度、道路通达度分值、定级单元分值为必填；若采用\
    \ “修正法”定级，定级方法、水源保证率、水源保证率分值、水源保证率修正系数、田间路网、田间路网分值、田间路网修正系数、中心城市影响度、中心城市影响度分值、中心城市影响度修正系数、对外交通便利度、对外交通便利度分值、对外交通便利度修正系数、道路通达度、道路通达度分值、道路通达度修正系数、\
    \ 分等单元分值、定级单元分值为必填。 \n注10：园地、林地、草地定级指标体系一般在必选和备选指标中选择，必选指标应全部纳入评价体系，备选指标酌情纳入，对当地级别划定确实有显著影响的其他指标，在充分论证后可纳入，指标数量不超过2个。新增指标1、新增指标2为地方自行纳入的评价指标，若纳入评价指标体系，指标名称、内涵需在“备注”字段说明。\
    \ \n注11：是否原有成果转换：原有农用地定级估价成果转换的填写“是”，否则填“否”。"
