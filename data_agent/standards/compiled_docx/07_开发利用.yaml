  notes:
  - '注1：标识码、要素代码、行政区代码、行政区名称、地类编码、地类名称、权属性质、权属单位代码、权属单位名称、坐落单位代码、坐落单位名称、分等图斑面积继承于2020年国土变更调查。

    注2：林种、起源、森林类别取自森林草原综合监测成果数据及其他林业相关数据。

    注3：林种：防护林、用材林、经济林、能源林和特殊用途林。

    注4：起源：人工、天然。

    注5：森林类别：公益林、商品林。

    注6：坡度：见GB/T 38590-2020坡度代码。

    注7：腐殖质厚度解译模型：是、否。

    注8：若序号33腐殖质厚度解译模型为“是”，则序号34腐殖质厚度可以为空，序号41植被覆盖类型为必填。序号35腐殖质厚度分值通过植被覆盖类型打分方式获得。若腐殖质厚度解译模型为“否”，序号34腐殖质厚度与序号35腐殖质厚度分值不可为空，序号41植被覆盖类型不填。

    注9：生物多样性：丰富、一般、不丰富。

    注10：若生物多样性解译模型为“是”，则序号39 生物多样性可以为空，序号42生态保护红线自然保护地。红线、序号43生态保护红线自然保护地红线分值、序号44
    起源、序号45起源分值为必填，序号40 生物多样性分值通过序号43生态保护红线自然保护地红线分值、序号45起源分值计算得到。若生物多样性解译模型为“否”，则序号39
    生物多样性不可为空，序号42 生态保护红线自然保护地红线、序号43生态保护红线自然保护地红线分值、序号44起源、序号45起源分值不填。

    注11：序号42生态保护红线、自然保护地红线，填写方式如下：图斑在自然保护区或国家公园内填“1”，在自然公园或生态红线内填“2”，不在上述范围内填“3”。若存在“1”、“2”两种情况，填写“1”。

    注12：国家级等别划分标准需各省份成果质检通过后研究确定，各省份上报林地分等成果时，数据库中暂不填写“分等单元标准化分值”、“国家级林地等别”字段。'
