    constraint: ''
    note: ''
  notes:
  - '注1：标识码、要素代码、地类编码、地类名称、权属性质、权属单位代码、权属单位名称、坐落单位代码、坐落单位名称继承于最新国土变更调查数据库。

    注2：林地定级单元可在最新国土变更调查的基础上进行细化、破斑。图斑来源填写生成图斑所叠加的数据名称， 未细化破斑图斑来源字段可不填。单元编号前18位取自国土变更调查与BSM保持一致，后4位为自然顺序编码,
    如图斑范围与变更调查范围一致未破斑“图斑编号”为BSM+0001，如破斑为2块“图斑编号”分别为BSM+0001、BSM+0002，单元编号在林地定级矢量数据库中取值唯一。

    注3：若图斑范围与变更调查范围一致未破斑，定级图斑面积继承国土变更调查图斑面积；若图斑为分割小斑，定级图斑面积按照面积占比法计算各个分割小斑面积，各分割小斑面积之和应与变更调查原始斑块图斑面积一致，不一致需进行平差处理。

    注4：图斑是飞入地填写“1”，不是飞入地填写“0”，当该地类图斑飞入地时，实际坐落单位的代码与权属单位代码不同。

    注5：若是否原有成果转换填写“否”，森林类别为必填。若是否原有成果转换填写“是”，森林类别可为空。注6：数据年份字段填写选用变更调查底图数据年份（2021、2022）。

    注7：若森林类别为“公益林”，公益林定级方法字段为必填字段，填写“因素法”或“修正法”；森林类别为“商品林”，公益林定级方法字段不填。

    注8：若是否原有成果转换填写“否”且森林类别为“公益林”且公益林定级方法为“修正法”时，郁闭度或覆盖度、郁闭度或覆盖度分值、郁闭度或覆盖度修正系数、公益林保护等级、公益林保护等级分值、公益林保护等级修正系数、分等单元分值、公益林标准化分值、公益林级别为必填。

    注9：（是否原有成果转换填写“否”且森林类别为“商品林”）或者（是否原有成果转换填写“否”且森林类别为“公益林”且定级方法为“因素法”）时，坡度、坡度分值、坡位、坡位分值、土层厚度、土层厚度分值、腐殖质厚度解译模型、可及度、可及度分值、集材距离、集材距离分值、商品林分值、商品林级别为必填。

    注10：若是否原有成果转换填写“是”，郁闭度或覆盖度、郁闭度或覆盖度分值、郁闭度或覆盖度修正系数、公益林保护等级、公益林保护等级分值、公益林保护等级修正系数、坡度、坡度分值、坡位、坡位分值、土层厚度、土层厚度分值、腐殖质厚度解译模型、腐殖质厚度、植被覆盖类型、腐殖质厚度分值、可及度、可及度分值、集材距离、集材距离分值、分等单元分值、公益林标准化分值、公益林级别、商品林分值、商品林级别可为空。

    注11：腐殖质厚度解译模型：是、否。

    注12：当是否原有成果转换填写“否”，按商品林定级时，若腐殖质厚度解译模型为“是”，则腐殖质厚度、腐殖质厚度分值可以为空，植被覆盖类型为必填。若腐殖质厚度解译模型为“否”，腐殖质厚度、腐殖质厚度分值为必填，植被覆盖类型可为空。

    注13：园地、林地、草地定级指标体系一般在必选和备选指标中选择，必选指标应全部纳入评价体系，备选指标酌情纳入，对当地级别划定确实有显著影响的其他指标，在充分论证后可纳入，指标数量不超过2个。新增指标1、新增指标2为地方自行纳入的评价指标，若纳入评价指标体系，指标名称、内涵需在“备注”字段说明。

    注14：是否原有成果转换字段为“是”，原有成果转换林地级别为必填；是否原有成果转换字段为“否”，原有成果转换林地级别为空。

    注15：是否原有成果转换：原有农用地定级估价成果转换的填写“是”，否则填“否”。'
