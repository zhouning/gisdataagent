    名称、坐落单位代码、坐落单位名称、分等图斑面积继承于2020年国土变更调查。

    注2：图斑是飞入地填写“1”，不是飞入地填写“0”，当该地类图斑飞入地时，实际坐落单位的代码与权属单位

    代码不同。

    注3：分等定级一级分区代码和分等定级一级分区名称指的是全国自然资源分等定级一级分区代码及名称。

    注4：茶园分等时，年日照时数和年日照时数分值可为空。相对湿度和相对湿度分值为必填。

    注5：其他园地分等时，年极端低温和年极端低温分值可为空。

    注6：果园和茶园分等时，坡向为必选指标。坡向分值不为空。

    注7：国家级等别划分标准需各省份成果质检通过后研究确定，各省份上报园地分等成果时，数据库中暂不填写“分等单元标准化分值”、“国家级园地等别”字段。'
