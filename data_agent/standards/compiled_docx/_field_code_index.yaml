? '表注：

  “行政区名称”栏，根据“行政区代码”值，依据GB/T2260，填写到县级。

  “行政区代码”栏，取“国土三调”“坐落单位代码”前6位。

  数据来源于地籍数据库、不动产登记信息管理基础平台，土地市场动态监测与监管系统、查清宗地使用权主体、类型、期限、权利变化等使用权相关属性信息。

  “宗地编号”栏，按宗地地籍号填写。

  “批准用途”栏，按地籍调查的土地用途填写。混合用地，按土地主用途填写，兼容用途及面积需在备注中说明。

  “使用权利人类型详查”栏，可依据使用权利人名称并结合和自行开展详查的基础上，细分地籍调查成果中的使用权利人类型，填写类型为自然资源清单中“清单范围”的类型，如“省属企业、省属事业单位”等。

  “合同编号”栏，按照签订的合同号填写。

  “林地使用年限”栏，按合同签订的年限填写。

  “林地使用/承包起始时间”、“林地使用/承包起结束时间”栏，按合同签订的起始时间填写。

  数据来源于地籍数据库。'
