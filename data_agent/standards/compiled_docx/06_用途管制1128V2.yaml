  notes:
  - '注1: 要素代码为空间要素唯一标识；

    注2：项目代码使用投资项目在线审批监管平台产生的项目代码。其他表的同名字段均引用该字段；

    注3：电子监管号填写批准后部系统生成的电子监管号；

    注4：案卷编号为办理建设项目用地预审与规划选址的案卷编号，用于业务数据与空间数据关联；

    注5：行政区代码取《中华人民共和国行政区代码》（GB/T 2260），以下相同字段，含义相同，不再一一解释；

    注6：行业分类代码引用 GB/T 4754-2017 国民经济行业分类，填写到小类；

    注7：土地用途引用 《国土空间调查、规划、用途管制用地用海分类指南（试行）》，填写主用途，根据工作需要填写一级类或二级类。其他表的同类字段遵循同样规则。

    注8：许可类型：0-“仅预审”，1-“选址+预审”，2-“仅选址”。'
