  - '注1：申请人即采矿权人；

    注2：企业类型根据企业营业执照证载的类型填写；

    注3：探矿权证号填写不动产统一登记证书（探矿权）证号；

    注4：采矿权证号填写不动产统一登记证书（采矿权）证号；

    注5：非油气填写；

    注6：非油气填写；

    注7：油气填写；

    注8：涉及多种共伴生矿种时可多选；

    注9：非油气填写；

    注10：非油气填写；

    注11：非油气填写；

    注12：油气填写；

    注13：变更情形为“变更采矿权人或采矿权转让”时填写

    注14：变更情形为“缩小开采区域”或“扩大开采区域”时填写；

    注15：变更情形为“扩大开采区域”时填写；

    注16：变更情形为“扩大开采区域”或“变更开采方式”时填写；

    注17：变更情形为“变更主要开采矿种”时填写；

    注18：变更情形为“变更开采方式”时填写；

    注19：注销采矿许可理由为“资源枯竭，已批准闭坑”时填写；

    注20：注销采矿许可理由为“政策性关闭，已公告或下达关闭决定”时填写；

    注21：数据状态：当采矿权空间数据发生变化时，原来的数据变为历史，变化后的数据为现势。'
