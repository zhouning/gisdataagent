  - '注1：约束条件说明相应的元数据实体或元素是否必须包括在核心元数据中，或满足一定条件时必须包括。约束条件可能有如下三种取值：①是（m）必须包括的元数据实体或元素。否的实体中可以有是的元素，这些元素只有在否的实体被选中时才成为是元素；②条件是（c）：当满足约束条件中的条件时，相应的元数据实体或元素必须包括在核心元数据中；③否（o）：元数据实体或元素可以包括,也可不包括在核心元数据中。定义否的元数据实体和否的元数据元素，是为满足描述不同数据集的需要。如果没有选用某个实体，则该实体包含的元素（包括是的元素）也不能选用。下同。

    注2：当一个字段中有多个值时，各值间用分号“；”分隔，下同。'
