    注2：城镇住宅用地面层（CZZZA）中，现状类型名称（CCN）为“商品住房（地上）”或“保障性住房（地上)”的图斑范围内，该属性项必填，数据取整数。填写达到入住、使用条件的成套住宅的套数或房屋间数，优先填写套数。对于城镇住宅用地图斑内的房屋建筑，若不是用来居住的，如垃圾站、幼托机构、商铺、电梯井等，其套（间）数填写0。

    注3：城镇住宅用地面层（CZZZA）中，现状类型名称（CCN）为“商品住房（地上）”或“保障性住房（地上)”的图斑范围内，该属性项必填。若取值精度较高，保留与精度相应的小数位；若通过估算等手段获取，应取整。

    注4：用来说明建筑高度、占地面积、建筑总面积、房屋套（间）数、商品住房建筑面积、商品住房房屋套（间）数、保障性住房建筑面积、保障性住房房屋套（间）数这8个属性项的来源以此判定属性准确程度。各个属性来源标记之间用“/”隔开。

    属性来源标记取值为两位数字码：

    a）第一位为属性内容的标识，取值1-8，其中“1”代表建筑高度；“2”代表占地面积；“3*代表建筑总面积；“4”代表房屋套（间）数；“5”代表商品住房建筑面积；“6”代表商品住房房屋套（间）数；“7”代表保障性住房建筑面积；“8”代表保障性住房房屋套（间）数。

    b）第二位为属性来源，取值为1-4，其中：“1”表示属性来源于实地测量调查；“2”表示属性来源于三维测量；“3”表示属性来源于专题资料；“4”表示属性来源于估算。

    例：11/22/31/41/52/61/71/81。

    若单位房屋建筑，并非位于城镇住宅用地面层（CZZZA）现状类型名称（CCN）为“商品住房（地上）”或“保障性住房（地上)”的图斑范围内，填写“属性来源标记”时，房屋套（间）数、商品住房建筑面积、商品住房房屋套（间）数、保障性住房建筑面积、保障性住房房屋套（间）数对应的“属性来源”标记为“0”。'
