  notes:
  - '注1：图斑以村级调查区为单位统一顺序编号。变更图斑号在本村级调查区最大图斑号后续编。

    注2：地类编码和名称按《第三次全国国土调查技术规程》附录A第三次全国国土调查土地分类执行，填写最末级分类。

    注3：权属单位代码和名称为该地类图斑实际权属单位的代码和名称。城镇村细化调查中，多宗地合并为一个地类图斑，可以填写一种主要的权属单位名称与代码，也可将多宗地的上一级权属单位名称与代码录入相应字段，各地可指定相应的规则，但应符合字段类型和长度要求。

    注4：坐落单位代码指该地类图斑实际坐落单位的代码。

    注5：图斑面积指用经过核定的地类图斑多边形边界内部所有地类的面积（如地类图斑含岛、孔，则扣除岛、孔的面积）。

    注6：扣除地类面积=图斑面积×扣除地类系数。

    注7：图斑地类面积=图斑面积－扣除地类面积。

    注8：当图斑为坡地耕地时，耕地类型填写“PD”；图斑为梯田耕地时，耕地类型填写“TT”。

    注9：线状地物是指河流、铁路、公路、管道用地、农村道路、林带和沟渠等。线状地物图斑宽度填写线状地物平均宽度。

    注10：根据GB/T28407开展耕地分等调查评价，填写利用等。

    注11：图斑是飞入地时填写“1”，不是飞入地时填写“0”。当该地类图斑为飞入地时，实际坐落单位的代码与权属单位代码不同。

    注12：对城市、建制镇和村庄范围内的地类图斑，相应标注城市（201或201A）、建制镇（202或202A）或村庄用地（203或203A）属性；城镇村外部的盐田及采矿用地和特殊用地按实地利用现状调查，并标注“204”或“205”属性。

    注13：数据年份为数据生产的年份。

    注14：海岛年份填写图斑所在海岛的名称。'
