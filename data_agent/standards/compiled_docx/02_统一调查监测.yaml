  notes:
  - '注1：车道数（LANE）按照实际划定的正规机动车道数填写，不含应急车道和非机动车道。不划车道的道路，按每车道3.5米的宽度标准进行推算，即用机动车道路面宽度除以3.5后，不做四舍五入，取商的整数部分作为车道数的取值；宽度小于3.5米的通车道路，车道数为1。车道数采集时需注意，一般情况下，一个以上车道且双向通行道路的合理车道数多为偶数。

    注2：在遇到重复路段时，该属性项优先填写最高等级的线路编码（道路编号）（RN），同等级的优先填写编号小的线路编码（道路编号）（RN），重复路段的其他路段编号均填写在重复路段编号（RNP）属性项中。

    注3：是否高架（ELEVT）取值范围为0-6，含义如下：

    a）“0”表示不是高架：默认值为0；

    b）“1”表示高架，且高架两侧、下方均无并行的地面道路；

    c）“2”表示高架，且仅高架单侧有并行的地面道路；

    d）“3”表示高架，且高架两侧均有并行的地面道路，高架下方无并行地面道路；

    e）“4”表示高架，且高架两侧、下方均有并行的地面道路；

    f）“5”表示高架，且在高架下方及单侧有并行地面道路时；

    g）“6”表示高架，且仅在高架下方有并行地面道路，而两侧无并行地面道路。'
