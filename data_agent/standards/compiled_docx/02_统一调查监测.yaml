  notes:
  - '注1：行政区代码在现有行政区划代码的基础上详细到乡（镇、街道），即：县及县级以上行政区划代码+乡（镇、街道）代码。县及县级以上行政区划代码采用GB/T2260中的6位数字码，乡（镇、街道）代码为3位数字码。

    注2：行政区代码相同的行政区要素填写其所属行政区的调查面积；行政区范围未发生变化，该行政区调查面积保持不变；县级行政区划内，所有乡级行政区调查面积之和应等于该县级行政区调查面积。

    注3：计算面积指根据行政区界线坐标计算的椭球面积。本标准中所有面积字段如无特别说明，均指椭球面积。

    注4：描述说明栏海岛区域填写代码01，非海岛区域填写00。'
