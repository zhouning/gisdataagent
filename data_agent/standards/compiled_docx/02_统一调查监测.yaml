  notes:
  - '注1：上下行方向可分为上行、下行、并行、同线4种，判定方式如下：(1)同属一条铁路线的两条轨道分离，用两条几何线段表示，其中主要在西侧或北侧的线为“上行”；(2)同属一条铁路线的两条轨道分离，用两条几何线段表示，其中主要在东侧或南侧的线为“下行”；(3)采集的铁路路段为双线时，该路段的上行和下行线用一条几何线段表示，表示为“并行”；(4)采集的铁路路段为单线铁路，上下行线路为使用同一轨道，表示为“同线”。

    注2：类型分为高速、普通2种，判定方式如下：(1)时速大于250km/h为“高速”；(2)时速小于250km/h为“普通”。

    注3：根据要素的不同变化类型，取值范围包括：

    a）“0”表示更新了专有属性项的值，但修正缺省值不属于属性取值变化；

    b）“1”表示在本底数据基础上发生了伸缩；

    c）“2”表示实地未发生变化，受监测范围改变、纠错等因素影响，在本地数据基础上增加了新的要素；

    d）“3”表示实地发生变化，增加了新的要素。

    同时有专有属性项取值更新和图形变化时，按照图形变化类型填写。同时包括多种类型图形变化时，按照变化类型的取值大小确定优先级，值越大的越优先。'
