    a)快速路——城市道路中设有中央分隔带，具有四条以上的车道，全部或部分采用立体交叉与控制出入，供车辆以较高的速度行驶的道路；

    b)主干路——在城市道路网中起骨架作用的道路；

    c)次干路——城市道路网中的区域性干路，与主干路相连接，构成完整的城市干路系统；

    d)支路——城市道路网中干路以外联系次干路或供区域内部使用的道路；

    e)地铁——主要在城市地下空间修筑的隧道中运行的大运量轨道运输系统；

    f)地面轨道——地铁地面化的路段以及城市中的轻轨；

