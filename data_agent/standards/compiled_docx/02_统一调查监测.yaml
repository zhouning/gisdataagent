  notes:
  - '注1：不同地类，其类型（TYPE）属性项的取值范围不同。

    a）对外交通场站：取值范围为“码头/火车站/长途汽车站/……”；

    b）公共交通场站：取值范围为“公共汽（电）车站/公共汽（电）车停车场（库）/出租汽车集中营业站（侯客站）/轮渡/公共汽（电）车保养场/地铁检修场……”。若存在多种类型、无法区分地面范围时，可采集整体范围，属性列出所有类型，用“/”分隔；

    c）机场：取值范围为“民用/军民合用”。

    注2：不同地类，其备注（RMK）属性项的取值范围不同。

    a）码头：取值范围为“水运港客运站/固定顺岸码头/固定堤坝码头/栈桥式码头/浮码头”；

    b）火车站：取值范围为“火车站（货运）/火车站（客运）/火车站（客货运）”；

    c）长途汽车站：取值范围为“长途汽车站（货运）/长途汽车站（客运）/长途汽车站（客货运）”；

    d）公共汽（电）车站：取值范围为“公共汽（电）车首战/公共汽（电）车末站/……”。若首战末站均为相同地址、无法区分开时，备注（RMK）属性项填写“公共汽（电）车首战/公共汽（电）车末站”。'
