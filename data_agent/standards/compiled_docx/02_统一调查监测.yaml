  - '注1：①坐落单位代码填写至村级调查区，代码填写为行政村（社区居民委员会）代码+“000000”，坐落单位名称填写村级调查区名称；②乡（镇、街道）界线内，村级调查区未覆盖的区域，代码填写为乡（镇、街道）行政区代码+“9990000000”，坐落单位名称填写乡（镇、街道）行政区名称+“直属”。

    注2：坐落单位代码相同的多个村级调查区要素填写该村级调查区的总调查面积；村级调查区范围未发生变化，该村级调查区调查面积保持不变；乡级行政区划内，不同坐落单位代码对应的村级调查区调查面积之和应等于该乡级行政区调查面积。

    注3：对于拥有多个村级调查区的海岛，海岛名称通过海岛名称+2位顺序号区分。'
