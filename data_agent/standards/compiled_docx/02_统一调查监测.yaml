    name_cn: 变化类型
    code: ChangeType
    dtype: Text
    length: '1'
    decimal: ''
    domain: ''
    constraint: C
    note: 本年度新增要素必填；该要素原先存在、仅扩大范围的，填写缺省值缺省值；见本表注2
  notes:
  - '注1：填写数据的核实时间，可以是影像时间，也可以是外业调绘时间、参考资料时间等。采用GB/T7408-2005/ISO8601:2000中日期的完全表示法的扩展格式YYYY-MM-DD表示，不确定的部分补0。属性结构调整导致的修改，不属于更新范畴。例：2024年城市国土空间监测成果中采集的要素，其空间范围、自身属性内容均未发生变化，GXSJ可填写2024-00-00。

    注2：根据要素的不同变化类型进行填写，取值范围包括：“2”表示实地未发生变化，受监测范围改变、纠错等因素影响，在本底数据基础上增加新的要素；“3”表示实地发生变化，增加了新的要素。同时包括多种变化类型时，按照变化类型的取值大小确定优先级，值越大的越优先。'
