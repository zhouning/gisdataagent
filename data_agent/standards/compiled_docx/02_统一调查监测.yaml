    name_cn: 监测时实地与上年度国土变更调查成果地类二级类是否一致
    code: IFCON
    dtype: Text
    length: '32'
    decimal: ''
    domain: ''
    constraint: M
    note: 一致的，填写“是”；不一致、需进行外业举证的，填写“否”；不一致、但视为特例，无需进行外业举证的，填写“-9999”；不一致，2024年已举证过，且监测时实地没有新变化、无需重复举证的，填写“-9999”
  - seq: '8'
    name_cn: 更新时间
    code: GXSJ
    dtype: Text
    length: '10'
    decimal: ''
