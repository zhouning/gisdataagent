  notes:
  - '注1：采用19位定长编码，1-12位为分类单元坐落单位代码，其中1-6位为GB/T2260中的县级行政区划代码，7-9位为乡级行政代码（3位），10-12位为村级行政代码（3位），13-19位为0000001开始的单元流水编码。若按乡级行政区统一编制分类单元流水号，则村级代码填写“000”。

    注2：图斑以村级调查区为单位统一顺序编号。变更图斑号在本村级调查区最大图斑号后续编。

    注3：地类编码和名称按《第三次全国国土调查技术规程》附录A第三次全国国土调查工作分类执行，填写最末级分类。

    注4：权属单位代码和名称为该地类图斑实际权属单位的代码和名称。城镇村细化调查中，多宗地合并为一个地类图斑，可以填写一种主要的权属单位名称与代码，也可将多宗地的上一级权属单位名称与代码录入相应字段，各地可制定相应的规则，但应符合字段类型和长度要求。

    注5：坐标单位代码指该地类图斑实际坐落单位的代码。

    注6：图斑面积指用经过核定的地类图斑多边形边界内部所有地类的面积（如地类图斑含岛、孔，则扣除岛、孔的面积）。

    注7：扣除地类面积＝图斑面积×扣除地类系数。

    注8：图斑地类面积＝图斑面积－扣除地类面积。

    注9：当图斑为坡地耕地时，耕地类型填写“PD”；图斑为梯田耕地时，耕地类型填写“TT”。

    注10：线状地物是指河流、铁路、公路、管道用地、农村道路、林带和沟渠等线状地物。线状地物图斑宽度填写线状地物平均宽度。

    注11：图斑是飞入地填写“1”，不是飞入地填写“0”。当该地类图斑为飞入地时，实际坐落单位的代码与权属单位代码不同。

    注12：对城市、建制镇和村庄范围内的地类图斑，相应标注城市（201或201A）、建制镇（202或202A）或村庄用地（203或203A）属性；城镇村外部的盐田及采矿用地和特殊用地按实地利用现状调查，并标注“204”或“205”属性。

    注13：取字典表中的分类标准，其中a-卡庆斯基制，b-美国农业部制，c-国际制。

    注14：取字典表中各分类标准的具体土壤质地值。

    注15：耕地资源质量分类结果用12为代码来表达，其中1-2位是耕地所在的自然区代码，第3-12位分别是耕地的坡度、土层厚度、土壤质地、土壤有机质含量、土壤pH值、生物多样性、土壤重金属污染状况、熟制和耕地二级地类代码。'
