- module: 02_统一调查监测
  table_name_cn: ''
  table_code: ''
  caption_raw: 点层（属性表名：DLTBBHP）属性结构描述表
  section_path:
  - 城市国土空间监测（2025）数据库结构定义
  - 空间要素属性结构
  - 变化数据集属性结构
  fields:
  - seq: '1'
    name_cn: 变化前类型编码
    code: BFCC
    dtype: Text
    length: '10'
    decimal: ''
    domain: ''
    constraint: M
    note: 依据上年度城市国土空间监测成果的变化（或细化）后类型代码（CC）填写
  - seq: '2'
    name_cn: 变化前类型名称
    code: BFCCN
    dtype: Text
    length: '60'
    decimal: ''
    domain: ''
    constraint: M
    note: 依据上年度城市国土空间监测成果的变化（或细化）后类型名称（CCN）填写
  - seq: '3'
    name_cn: 要素唯一标识码
    code: FEATID
    dtype: Text
    length: '16'
    decimal: ''
    domain: ''
    constraint: M
    note: 见本表注1
  - seq: '4'
    name_cn: 变化类型
    code: ChangeType
    dtype: Text
    length: '1'
    decimal: ''
    domain: ''
    constraint: M
    note: 见本表注2
  notes:
  - '注1：FEATID为16位顺序编号：一般情况下，前6位为区县行政区划代码，若要素跨区县级行政区，前6位则为城市行政区划代码；后10位采用阿拉伯数字编号，位数不足的“0”填充。FEATID在同一图层内应保持唯一。

    注2：根据要素的不同变化类型，取值范围包括：

    a）“0”表示实地未发生变化，受国土变更调查地类图斑变化、技术方案调整等其他因素影响，监测要素不再满足采集条件，需去除；

    b）“1”表示实地发生变化，监测要素范围发生了缩小；

    c）“3”表示实地发生变化，监测要素整体灭失；

    d）“9”表示监测过程中发现前一期数据明显有误，进行了纠错。

    同时包括多种变化类型时，按照变化类型的取值大小确定优先级，值越大的越优先。'
