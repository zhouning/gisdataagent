# 质检工作流预置模板 (QC Workflow Templates)
# 可通过 POST /api/workflows/from-template 实例化

templates:
  - id: surveying_qc_standard
    name: 标准质检流程
    description: 数据接收→预处理→规则审查→精度核验→报告生成 (5步标准流程)
    pipeline_type: governance
    priority: normal
    sla_total_seconds: 3600
    parameters:
      standard_id:
        type: string
        default: gb_t_24356
        description: 质检标准ID
      product_type:
        type: string
        default: DLG
        description: 成果类型
      tolerance_m:
        type: number
        default: 0.5
        description: 精度容差(米)
    steps:
      - step_id: data_receive
        label: 数据接收与格式校验
        pipeline_type: governance
        prompt: "请对上传的 {product_type} 类型数据进行格式校验，检查文件完整性、坐标系定义、编码格式，使用标准 {standard_id}。"
        sla_seconds: 300
        retry_on_timeout: false
        max_retries: 0

      - step_id: data_preprocess
        label: 数据预处理与清洗
        pipeline_type: governance
        prompt: "对数据进行预处理：统一坐标系为 EPSG:4490，修复可自动修正的格式错误，去除重复要素，按 {standard_id} 标准补齐缺失字段。"
        sla_seconds: 600
        retry_on_timeout: true
        max_retries: 1

      - step_id: rule_audit
        label: 规则审查
        pipeline_type: governance
        prompt: "按照 {standard_id} 标准对数据进行全面规则审查，包括：字段完整性、属性值域、逻辑一致性、命名规范、时效性检查。输出缺陷分类统计。"
        sla_seconds: 900
        retry_on_timeout: false
        max_retries: 0

      - step_id: precision_verify
        label: 精度核验
        pipeline_type: governance
        prompt: "对数据进行几何精度核验，包括：坐标精度检查（容差 {tolerance_m} 米）、拓扑完整性检查、接边精度分析。输出精度评分。"
        sla_seconds: 600
        retry_on_timeout: false
        max_retries: 0

      - step_id: report_generate
        label: 质检报告生成
        pipeline_type: governance
        prompt: "汇总前序步骤的审查结果和精度核验结果，生成标准质检报告，包含：数据概况、缺陷统计、精度评分、质量等级、整改建议。导出为 Word 格式。"
        sla_seconds: 300
        retry_on_timeout: false
        max_retries: 0

  - id: surveying_qc_quick
    name: 快速质检
    description: 快速审查→报告 (2步简化流程，适用于常规复查)
    pipeline_type: governance
    priority: low
    sla_total_seconds: 900
    parameters:
      standard_id:
        type: string
        default: gb_t_24356
        description: 质检标准ID
    steps:
      - step_id: quick_audit
        label: 快速审查
        pipeline_type: governance
        prompt: "对数据进行快速质检：检查字段完整性、坐标系一致性、拓扑有效性，按 {standard_id} 标准输出缺陷列表。"
        sla_seconds: 600
        retry_on_timeout: false
        max_retries: 0

      - step_id: quick_report
        label: 快速报告
        pipeline_type: governance
        prompt: "根据快速审查结果生成简要质检报告，包含缺陷统计和质量评分。"
        sla_seconds: 300
        retry_on_timeout: false
        max_retries: 0

  - id: surveying_qc_full
    name: 完整质检流程
    description: 含人工复核节点的完整质检流程 (7步)
    pipeline_type: governance
    priority: high
    sla_total_seconds: 7200
    parameters:
      standard_id:
        type: string
        default: gb_t_24356
        description: 质检标准ID
      product_type:
        type: string
        default: DLG
        description: 成果类型
      tolerance_m:
        type: number
        default: 0.5
        description: 精度容差(米)
    steps:
      - step_id: data_receive
        label: 数据接收与格式校验
        pipeline_type: governance
        prompt: "请对上传的 {product_type} 类型数据进行格式校验，检查文件完整性、坐标系定义、编码格式。"
        sla_seconds: 300
        retry_on_timeout: false
        max_retries: 0

      - step_id: data_preprocess
        label: 数据预处理与清洗
        pipeline_type: governance
        prompt: "对数据进行预处理：统一坐标系，修复可自动修正的缺陷，去重，补齐缺失字段。"
        sla_seconds: 600
        retry_on_timeout: true
        max_retries: 1

      - step_id: rule_audit
        label: 规则审查
        pipeline_type: governance
        prompt: "按照 {standard_id} 标准进行全面规则审查，输出缺陷分类统计。"
        sla_seconds: 900
        retry_on_timeout: false
        max_retries: 0

      - step_id: auto_fix
        label: 自动修正
        pipeline_type: governance
        prompt: "对规则审查中发现的可自动修正缺陷执行自动修正，记录修正日志。"
        sla_seconds: 600
        retry_on_timeout: true
        max_retries: 2

      - step_id: precision_verify
        label: 精度核验
        pipeline_type: governance
        prompt: "对修正后的数据进行几何精度核验，包括坐标精度、拓扑完整性、接边精度。"
        sla_seconds: 600
        retry_on_timeout: false
        max_retries: 0

      - step_id: human_review
        label: 人工复核
        pipeline_type: governance
        prompt: "汇总自动审查和精度核验结果，标记需要人工复核的严重缺陷（A类），生成复核清单。"
        sla_seconds: 1800
        retry_on_timeout: false
        max_retries: 0

      - step_id: final_report
        label: 最终报告生成
        pipeline_type: governance
        prompt: "综合所有审查、修正、核验和复核结果，生成最终质检报告，导出 Word 格式。"
        sla_seconds: 300
        retry_on_timeout: false
        max_retries: 0
