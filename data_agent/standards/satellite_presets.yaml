_version: "1.0.0"

presets:
  - name: sentinel2_l2a
    display_name: "Sentinel-2 L2A (光学, 10-20m)"
    source_type: stac
    endpoint_url: "https://earth-search.aws.element84.com/v1"
    collection: "sentinel-2-l2a"
    default_cloud_cover: 20
    resolution_m: 10
    revisit_days: 5
    bands:
      blue: B02
      green: B03
      red: B04
      rededge: B05
      nir: B08
      swir1: B11
      swir2: B12
      scl: SCL
    description: "欧空局 Sentinel-2 地表反射率产品，10m 分辨率，5 天重访"

  - name: landsat8_c2_l2
    display_name: "Landsat 8/9 C2 L2 (光学, 30m)"
    source_type: stac
    endpoint_url: "https://landsatlook.usgs.gov/stac-server"
    collection: "landsat-c2l2-sr"
    default_cloud_cover: 20
    resolution_m: 30
    revisit_days: 16
    bands:
      blue: B2
      green: B3
      red: B4
      nir: B5
      swir1: B6
      swir2: B7
    description: "USGS Landsat 8/9 地表反射率，30m 分辨率，16 天重访"

  - name: sentinel1_grd
    display_name: "Sentinel-1 GRD (SAR, 10m)"
    source_type: stac
    endpoint_url: "https://earth-search.aws.element84.com/v1"
    collection: "sentinel-1-grd"
    default_cloud_cover: null
    resolution_m: 10
    revisit_days: 6
    bands:
      vv: VV
      vh: VH
    description: "欧空局 Sentinel-1 C-band SAR，全天候不受云影响，10m 分辨率"

  - name: cop_dem_glo30
    display_name: "Copernicus DEM GLO-30 (30m)"
    source_type: stac
    endpoint_url: "https://earth-search.aws.element84.com/v1"
    collection: "cop-dem-glo-30"
    default_cloud_cover: null
    resolution_m: 30
    revisit_days: null
    bands:
      elevation: data
    description: "哥白尼全球 30m 数字高程模型"

  - name: esri_lulc_10m
    display_name: "Esri LULC 10m (2017-2024)"
    source_type: custom
    endpoint_url: "built-in"
    collection: "esri-lulc-10m"
    default_cloud_cover: null
    resolution_m: 10
    revisit_days: 365
    bands:
      lulc: data
    description: "Esri 基于 Sentinel-2 的全球 10m 土地利用/覆盖 (内置 download_lulc)"
