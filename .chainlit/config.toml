[project]
# 🟢 CHANGE: Browser Tab Title
name = "Data Agent"
user_env = []
duration = 0
watch_ignore = ["data_agent/uploads/**", "data_agent/downloads/**", "*.log", "*.db"]

[features]
prompt_playground = true
unsafe_allow_html = true
latex = true
multi_modal = true
speech_to_text = true

[UI]
# 🟢 CHANGE: Header Name
name = "Data Agent"
description = "AI-powered Spatial Optimization Platform"
show_readme_as_new_chat_button = true
default_theme = "light"
custom_js = "/public/register_link.js"
custom_build = "frontend/dist"

[meta]
generated_by = "0.7.700"

[features.spontaneous_file_upload]
enabled = true
accept = ["text/csv", "application/zip", "application/x-zip-compressed", "application/octet-stream", ".zip", ".shp", ".shx", ".dbf", ".prj", ".cpg", ".geojson", ".gpkg", ".kml", ".kmz", ".tif", ".tiff", ".xlsx", ".xls", ".json", ".dwg", ".dxf", ".obj", ".stl"]
max_size_mb = 500

# Starters
