apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gis-agent-app-hpa
  namespace: gis-agent
  labels:
    app.kubernetes.io/name: gis-agent-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gis-agent-app
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
