apiVersion: apps/v1
kind: Deployment
metadata:
  name: gis-agent-app
  namespace: gis-agent
  labels:
    app.kubernetes.io/name: gis-agent-app
    app.kubernetes.io/component: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gis-agent-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gis-agent-app
        app.kubernetes.io/component: application
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: app
          image: gis-data-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: gis-agent-config
            - secretRef:
                name: gis-agent-secret
          volumeMounts:
            - name: uploads
              mountPath: /app/data_agent/uploads
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: gis-agent-uploads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gis-agent-uploads
  namespace: gis-agent
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
