# =============================================================================
# GIS Data Agent — Docker Compose
# Usage: docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostGIS Database
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: gis_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
    ports:
      - "5433:5432"        # Expose on 5433 to avoid conflicts with host PostgreSQL
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker-db-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-net

  # ---------------------------------------------------------------------------
  # GIS Data Agent Application
  # ---------------------------------------------------------------------------
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # PostgreSQL connection
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: gis_agent
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      # Admin credentials for migrations
      POSTGRES_ADMIN_USER: postgres
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      # Google AI — set in .env or pass at runtime
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      # Gaode Maps API
      GAODE_API_KEY: ${GAODE_API_KEY:-}
      # Chainlit
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-replace_with_a_real_secret}
      # Dynamic Planner
      DYNAMIC_PLANNER: ${DYNAMIC_PLANNER:-true}
      # Optional services
      HUAWEI_OBS_AK: ${HUAWEI_OBS_AK:-}
      HUAWEI_OBS_SK: ${HUAWEI_OBS_SK:-}
      HUAWEI_OBS_SERVER: ${HUAWEI_OBS_SERVER:-}
      HUAWEI_OBS_BUCKET: ${HUAWEI_OBS_BUCKET:-}
      TIANDITU_TOKEN: ${TIANDITU_TOKEN:-}
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      WECOM_APP_SECRET: ${WECOM_APP_SECRET:-}
      WECOM_TOKEN: ${WECOM_TOKEN:-}
      WECOM_ENCODING_AES_KEY: ${WECOM_ENCODING_AES_KEY:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      WECOM_SHARE_BASE_URL: ${WECOM_SHARE_BASE_URL:-}
      # DingTalk Bot (optional)
      DINGTALK_APP_KEY: ${DINGTALK_APP_KEY:-}
      DINGTALK_APP_SECRET: ${DINGTALK_APP_SECRET:-}
      DINGTALK_ROBOT_CODE: ${DINGTALK_ROBOT_CODE:-}
      DINGTALK_SHARE_BASE_URL: ${DINGTALK_SHARE_BASE_URL:-}
      # Feishu Bot (optional)
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
      FEISHU_SHARE_BASE_URL: ${FEISHU_SHARE_BASE_URL:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      DAILY_ANALYSIS_LIMIT: ${DAILY_ANALYSIS_LIMIT:-}
      MONTHLY_TOKEN_LIMIT: ${MONTHLY_TOKEN_LIMIT:-}
      AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-}
      # Redis (for real-time streams)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - uploads:/app/data_agent/uploads
      - worldpop_cache:/app/data_agent/uploads/.worldpop_cache
      # Optional: mount Google service account credentials
      # - ./secrets/service-account.json:/app/secrets/service-account.json:ro
    networks:
      - agent-net

  # ---------------------------------------------------------------------------
  # Redis (optional, for real-time data streams)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - agent-net

  # ---------------------------------------------------------------------------
  # CV Detection Service (Surveying QC — v15.7)
  # ---------------------------------------------------------------------------
  cv-service:
    build: ./subsystems/cv-service
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      MODEL_DIR: /app/models
      DEVICE: ${CV_DEVICE:-cpu}
    volumes:
      - cv-models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - agent-net
    profiles:
      - qc

  # ---------------------------------------------------------------------------
  # CAD/3D Parser Service (Surveying QC — v15.7)
  # ---------------------------------------------------------------------------
  cad-parser:
    build: ./subsystems/cad-parser
    restart: unless-stopped
    ports:
      - "8011:8000"
    volumes:
      - cad-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - agent-net
    profiles:
      - qc

  # ---------------------------------------------------------------------------
  # Martin Vector Tile Server (v17.1 — large dataset rendering)
  # ---------------------------------------------------------------------------
  martin:
    image: ghcr.io/maplibre/martin:v0.15
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://agent_user:${POSTGRES_PASSWORD:-change_me_strong_password}@db:5432/gis_agent
    command: ["--auto-bounds", "calc", "--listen-addresses", "0.0.0.0:3000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - agent-net
    profiles:
      - tiles

  # ---------------------------------------------------------------------------
  # Reference Data Service (Surveying QC — v15.7)
  # ---------------------------------------------------------------------------
  reference-data:
    build: ./subsystems/reference-data
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8012:8000"
    environment:
      DATABASE_URL: postgresql://agent_user:${POSTGRES_PASSWORD:-change_me_strong_password}@db:5432/gis_agent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - agent-net
    profiles:
      - qc

  # ---------------------------------------------------------------------------
  # AlphaEarth Backend
  # ---------------------------------------------------------------------------
  ae_backend:
    build: ./ae_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8085:8000"
    environment:
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: flights_dataset
      HUAWEI_OBS_AK: ${HUAWEI_OBS_AK:-}
      HUAWEI_OBS_SK: ${HUAWEI_OBS_SK:-}
      HUAWEI_OBS_SERVER: ${HUAWEI_OBS_SERVER:-}
      HUAWEI_OBS_BUCKET: ${HUAWEI_OBS_BUCKET:-}
    volumes:
      - ./data_agent/weights:/app/data_agent/weights
    networks:
      - agent-net

  # ---------------------------------------------------------------------------
  # AlphaEarth Frontend
  # ---------------------------------------------------------------------------
  ae_frontend:
    build: ./ae_frontend
    restart: unless-stopped
    depends_on:
      - ae_backend
    ports:
      - "80:80"
    networks:
      - agent-net

volumes:
  pgdata:
  uploads:
  worldpop_cache:
  redis-data:
  cv-models:
  cad-uploads:

networks:
  agent-net:
    driver: bridge
