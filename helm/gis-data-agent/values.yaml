# GIS Data Agent Helm Values

replicaCount: 1

image:
  repository: gis-data-agent
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  host: gis-agent.example.com
  tls: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 70

postgresql:
  enabled: true
  image: postgis/postgis:16-3.4
  storage: 10Gi
  auth:
    database: gis_agent
    username: postgres
    password: changeme

redis:
  enabled: true
  image: redis:7-alpine
  storage: 1Gi

env:
  CHAINLIT_AUTH_SECRET: ""
  GOOGLE_API_KEY: ""
  DB_HOST: "{{ .Release.Name }}-postgresql"
  DB_PORT: "5432"
  DB_NAME: gis_agent
  DB_USER: postgres

prometheus:
  scrape: true
  port: 8000
  path: /metrics

healthCheck:
  liveness:
    path: /health
    port: 8000
    initialDelaySeconds: 30
    periodSeconds: 30
  readiness:
    path: /ready
    port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
